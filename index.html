<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>每日计划</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { overscroll-behavior-y: contain; }
  body { -webkit-tap-highlight-color: transparent; }
  .no-select { user-select: none; -webkit-user-select: none; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  /* 滑动切换的过渡动画 */
  .slide-enter-left { animation: slideInLeft 220ms ease-out; }
  .slide-enter-right { animation: slideInRight 220ms ease-out; }
  @keyframes slideInLeft {
    from { transform: translateX(40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInRight {
    from { transform: translateX(-40px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
</style>
</head>
<body class="bg-slate-50">

<div id="app" class="w-full h-screen flex flex-col font-sans"></div>

<script>
/* =========================================================
   每日计划 App —— 完整版 (含左右滑动切换)
   ========================================================= */

// ---------- 状态 ----------
const state = {
  view: 'day',                 // 'day' | 'week' | 'month'
  cursor: new Date(),          // 当前定位日期
  events: loadEvents(),        // 事件列表
  editing: null,               // 正在编辑的事件
  slideDir: null,              // 'left' | 'right' 用于动画
};

const dragState = {
  active: false,
  id: null,
  startY: 0,
  origMin: 0,
  moved: false,
};

const swipeState = { x: 0, y: 0, t: 0, tracking: false };

// ---------- 工具 ----------
const pad = (n) => String(n).padStart(2, '0');
const fmtDate = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const sameDay = (a, b) => fmtDate(a) === fmtDate(b);
const startOfDay = (d) => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
const startOfWeek = (d) => {
  const x = startOfDay(d);
  const day = (x.getDay() + 6) % 7; // 周一为0
  x.setDate(x.getDate() - day);
  return x;
};
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
const addMonths = (d, n) => { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; };
const minToTime = (m) => `${pad(Math.floor(m/60))}:${pad(m%60)}`;
const uid = () => Math.random().toString(36).slice(2, 10);

function loadEvents() {
  try {
    const raw = localStorage.getItem('planner_events');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // 默认演示数据
  const today = fmtDate(new Date());
  return [
    { id: uid(), date: today, start: 9*60,  end: 10*60,    title: '晨会', color: 'sky',     done: false },
    { id: uid(), date: today, start: 10*60+30, end: 12*60, title: '产品评审', color: 'violet',  done: false },
    { id: uid(), date: today, start: 14*60, end: 15*60+30, title: '专注写代码', color: 'emerald', done: true },
    { id: uid(), date: today, start: 19*60, end: 20*60,    title: '健身', color: 'amber',  done: false },
  ];
}
function saveEvents() {
  try { localStorage.setItem('planner_events', JSON.stringify(state.events)); } catch(e) {}
}

const COLORS = {
  sky:     { bg:'bg-sky-100',     bd:'border-sky-400',     tx:'text-sky-800',     dot:'bg-sky-500'    },
  violet:  { bg:'bg-violet-100',  bd:'border-violet-400',  tx:'text-violet-800',  dot:'bg-violet-500' },
  emerald: { bg:'bg-emerald-100', bd:'border-emerald-400', tx:'text-emerald-800', dot:'bg-emerald-500'},
  amber:   { bg:'bg-amber-100',   bd:'border-amber-400',   tx:'text-amber-900',   dot:'bg-amber-500'  },
  rose:    { bg:'bg-rose-100',    bd:'border-rose-400',    tx:'text-rose-800',    dot:'bg-rose-500'   },
  slate:   { bg:'bg-slate-100',   bd:'border-slate-400',   tx:'text-slate-800',   dot:'bg-slate-500'  },
};

// ---------- 导航 ----------
function goPrev() {
  state.slideDir = 'right';
  if (state.view === 'day')   state.cursor = addDays(state.cursor, -1);
  if (state.view === 'week')  state.cursor = addDays(state.cursor, -7);
  if (state.view === 'month') state.cursor = addMonths(state.cursor, -1);
  render();
}
function goNext() {
  state.slideDir = 'left';
  if (state.view === 'day')   state.cursor = addDays(state.cursor, 1);
  if (state.view === 'week')  state.cursor = addDays(state.cursor, 7);
  if (state.view === 'month') state.cursor = addMonths(state.cursor, 1);
  render();
}
function goToday() { state.slideDir = null; state.cursor = new Date(); render(); }
function setView(v) { state.slideDir = null; state.view = v; render(); }

// ---------- 滑动切换 ----------
function onSwipeStart(e) {
  if (dragState.active) return;
  // 编辑面板打开时不切换
  if (state.editing) return;
  const t = e.touches ? e.touches[0] : e;
  swipeState.x = t.clientX;
  swipeState.y = t.clientY;
  swipeState.t = Date.now();
  swipeState.tracking = true;
}
function onSwipeEnd(e) {
  if (!swipeState.tracking) return;
  swipeState.tracking = false;
  if (dragState.active) return;
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const dx = t.clientX - swipeState.x;
  const dy = t.clientY - swipeState.y;
  const dt = Date.now() - swipeState.t;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 600) {
    if (dx < 0) goNext();
    else goPrev();
  }
}

// ---------- 编辑 ----------
function openEditor(ev) { state.editing = { ...ev }; render(); }
function closeEditor() { state.editing = null; render(); }
function saveEditor() {
  const e = state.editing;
  if (!e || !e.title.trim()) return;
  if (e.end <= e.start) e.end = e.start + 30;
  const idx = state.events.findIndex(x => x.id === e.id);
  if (idx >= 0) state.events[idx] = e;
  else state.events.push(e);
  saveEvents();
  state.editing = null;
  render();
}
function deleteEditor() {
  const e = state.editing;
  if (!e) return;
  state.events = state.events.filter(x => x.id !== e.id);
  saveEvents();
  state.editing = null;
  render();
}
function newEventOn(dateStr, startMin = 9*60) {
  openEditor({
    id: uid(), date: dateStr,
    start: startMin, end: startMin + 60,
    title: '', color: 'sky', done: false, _isNew: true,
  });
}
function toggleDone(id) {
  const e = state.events.find(x => x.id === id);
  if (e) { e.done = !e.done; saveEvents(); render(); }
}

// ---------- 拖拽 (日视图内移动事件) ----------
const HOUR_PX = 56;
const MIN_PX = HOUR_PX / 60;

function onEventDragStart(e, id) {
  e.preventDefault();
  e.stopPropagation();
  const ev = state.events.find(x => x.id === id);
  if (!ev) return;
  dragState.active = true;
  dragState.id = id;
  dragState.startY = e.touches ? e.touches[0].clientY : e.clientY;
  dragState.origMin = ev.start;
  dragState.moved = false;
  document.addEventListener('mousemove', onEventDragMove);
  document.addEventListener('mouseup', onEventDragEnd);
  document.addEventListener('touchmove', onEventDragMove, { passive:false });
  document.addEventListener('touchend', onEventDragEnd);
}
function onEventDragMove(e) {
  if (!dragState.active) return;
  e.preventDefault();
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  const dy = y - dragState.startY;
  if (Math.abs(dy) > 4) dragState.moved = true;
  const ev = state.events.find(x => x.id === dragState.id);
  if (!ev) return;
  const dur = ev.end - ev.start;
  let newStart = Math.round((dragState.origMin + dy / MIN_PX) / 15) * 15;
  newStart = Math.max(0, Math.min(24*60 - dur, newStart));
  ev.start = newStart;
  ev.end = newStart + dur;
  // 局部更新位置
  const el = document.querySelector(`[data-evid="${ev.id}"]`);
  if (el) {
    el.style.top = (ev.start * MIN_PX) + 'px';
    el.style.height = (dur * MIN_PX) + 'px';
    const lab = el.querySelector('[data-time]');
    if (lab) lab.textContent = `${minToTime(ev.start)} - ${minToTime(ev.end)}`;
  }
}
function onEventDragEnd(e) {
  if (!dragState.active) return;
  document.removeEventListener('mousemove', onEventDragMove);
  document.removeEventListener('mouseup', onEventDragEnd);
  document.removeEventListener('touchmove', onEventDragMove);
  document.removeEventListener('touchend', onEventDragEnd);
  const wasMoved = dragState.moved;
  const id = dragState.id;
  dragState.active = false;
  dragState.id = null;
  if (wasMoved) {
    saveEvents();
    render();
  } else {
    // 视为点击，打开编辑
    const ev = state.events.find(x => x.id === id);
    if (ev) openEditor(ev);
  }
}

// ---------- 渲染 ----------
function render() {
  const root = document.getElementById('app');
  root.innerHTML = `
    ${renderHeader()}
    <main id="mainArea" class="flex-1 overflow-hidden flex flex-col bg-slate-50">
      ${renderViewContainer()}
    </main>
    ${state.editing ? renderEditor() : ''}
    <button onclick="newEventOn('${fmtDate(state.cursor)}', 9*60)"
            class="fixed bottom-6 right-6 w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg flex items-center justify-center text-3xl z-30 active:scale-95 transition">
      +
    </button>
  `;
  // 给主区域绑定滑动
  const main = document.getElementById('mainArea');
  main.addEventListener('touchstart', onSwipeStart, { passive: true });
  main.addEventListener('touchend', onSwipeEnd);
  // 自动滚到 8:00
  const tg = document.getElementById('timeGrid');
  if (tg) tg.scrollTop = 7 * HOUR_PX;
}

function renderHeader() {
  const c = state.cursor;
  let title = '';
  if (state.view === 'day') {
    const wk = ['周日','周一','周二','周三','周四','周五','周六'][c.getDay()];
    title = `${c.getMonth()+1}月${c.getDate()}日 · ${wk}`;
  } else if (state.view === 'week') {
    const s = startOfWeek(c), e = addDays(s, 6);
    title = `${s.getMonth()+1}月${s.getDate()}日 - ${e.getMonth()+1}月${e.getDate()}日`;
  } else {
    title = `${c.getFullYear()}年${c.getMonth()+1}月`;
  }
  return `
    <header class="bg-white border-b border-slate-200 px-4 py-3 flex items-center gap-2 shadow-sm">
      <button onclick="goPrev()" class="w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-600 active:bg-slate-200">‹</button>
      <button onclick="goToday()" class="px-3 h-9 rounded-lg text-sm font-medium hover:bg-slate-100 text-slate-700">今天</button>
      <button onclick="goNext()" class="w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-600 active:bg-slate-200">›</button>
      <div class="flex-1 text-center font-semibold text-slate-800 text-base">${title}</div>
      <div class="flex bg-slate-100 rounded-lg p-1 text-xs">
        ${['day','week','month'].map(v => `
          <button onclick="setView('${v}')"
            class="px-2 py-1 rounded-md font-medium ${state.view===v?'bg-white shadow text-indigo-600':'text-slate-600'}">
            ${ {day:'日', week:'周', month:'月'}[v] }
          </button>
        `).join('')}
      </div>
    </header>
  `;
}

function renderViewContainer() {
  const animClass = state.slideDir === 'left' ? 'slide-enter-left'
                  : state.slideDir === 'right' ? 'slide-enter-right' : '';
  state.slideDir = null;
  let inner = '';
  if (state.view === 'day') inner = renderDay();
  else if (state.view === 'week') inner = renderWeek();
  else inner = renderMonth();
  return `<div class="flex-1 overflow-hidden flex flex-col ${animClass}">${inner}</div>`;
}

// 日视图
function renderDay() {
  const dateStr = fmtDate(state.cursor);
  const dayEvents = state.events
    .filter(e => e.date === dateStr)
    .sort((a,b) => a.start - b.start);
  const isToday = sameDay(state.cursor, new Date());
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  const hours = Array.from({length:24}, (_,i) => `
    <div class="relative" style="height:${HOUR_PX}px">
      <div class="absolute -top-2 left-2 text-xs text-slate-400 bg-slate-50 px-1">${pad(i)}:00</div>
      <div class="absolute top-0 left-14 right-2 border-t border-slate-200"></div>
      <div class="absolute left-14 right-2 border-t border-slate-100" style="top:${HOUR_PX/2}px"></div>
    </div>
  `).join('');

  const evHTML = dayEvents.map(ev => {
    const c = COLORS[ev.color] || COLORS.sky;
    const dur = ev.end - ev.start;
    return `
      <div data-evid="${ev.id}"
           class="absolute left-14 right-2 rounded-lg border-l-4 ${c.bg} ${c.bd} shadow-sm overflow-hidden no-select cursor-grab active:cursor-grabbing ${ev.done?'opacity-60':''}"
           style="top:${ev.start*MIN_PX}px; height:${dur*MIN_PX}px;"
           onmousedown="onEventDragStart(event, '${ev.id}')"
           ontouchstart="onEventDragStart(event, '${ev.id}')">
        <div class="p-2 flex items-start gap-2 h-full">
          <button onclick="event.stopPropagation(); toggleDone('${ev.id}')"
                  class="mt-0.5 w-4 h-4 rounded border-2 ${ev.done?c.bd+' '+c.dot:'border-slate-400 bg-white'} flex-shrink-0 flex items-center justify-center">
            ${ev.done ? '<span class="text-white text-xs leading-none">✓</span>' : ''}
          </button>
          <div class="flex-1 min-w-0">
            <div class="font-medium text-sm ${c.tx} truncate ${ev.done?'line-through':''}">${escape(ev.title)}</div>
            <div data-time class="text-xs ${c.tx} opacity-75">${minToTime(ev.start)} - ${minToTime(ev.end)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  const nowLine = isToday ? `
    <div class="absolute left-0 right-0 z-10 pointer-events-none" style="top:${nowMin*MIN_PX}px">
      <div class="flex items-center">
        <div class="w-3 h-3 rounded-full bg-rose-500 ml-12 -mr-1.5"></div>
        <div class="flex-1 border-t-2 border-rose-500"></div>
      </div>
    </div>
  ` : '';

  return `
    <div id="timeGrid" class="flex-1 overflow-y-auto scrollbar-thin relative bg-slate-50">
      <div class="relative" style="height:${24*HOUR_PX}px">
        ${hours}
        ${evHTML}
        ${nowLine}
      </div>
    </div>
  `;
}

// 周视图（PC 友好，移动端也可用）
function renderWeek() {
  const start = startOfWeek(state.cursor);
  const days = Array.from({length:7}, (_,i) => addDays(start, i));
  const today = new Date();
  return `
    <div class="flex-1 overflow-y-auto scrollbar-thin">
      <div class="grid grid-cols-7 gap-1 p-2">
        ${days.map(d => {
          const dateStr = fmtDate(d);
          const evs = state.events.filter(e => e.date === dateStr).sort((a,b)=>a.start-b.start);
          const isToday = sameDay(d, today);
          return `
            <div class="bg-white rounded-lg border ${isToday?'border-indigo-400':'border-slate-200'} p-2 min-h-[200px] flex flex-col">
              <div class="text-center mb-2">
                <div class="text-xs text-slate-500">${['一','二','三','四','五','六','日'][(d.getDay()+6)%7]}</div>
                <div class="font-semibold ${isToday?'text-indigo-600':'text-slate-800'}">${d.getDate()}</div>
              </div>
              <div class="flex-1 space-y-1 overflow-y-auto">
                ${evs.map(ev => {
                  const c = COLORS[ev.color] || COLORS.sky;
                  return `
                    <div onclick="openEditor(${JSON.stringify(ev).replace(/"/g,'&quot;')})"
                         class="text-xs ${c.bg} ${c.tx} rounded px-1.5 py-1 cursor-pointer truncate ${ev.done?'opacity-60 line-through':''}">
                      <span class="font-medium">${minToTime(ev.start)}</span> ${escape(ev.title)}
                    </div>
                  `;
                }).join('')}
              </div>
              <button onclick="newEventOn('${dateStr}', 9*60)" class="text-xs text-slate-400 hover:text-indigo-600 mt-1">+ 添加</button>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// 月视图
function renderMonth() {
  const c = state.cursor;
  const first = new Date(c.getFullYear(), c.getMonth(), 1);
  const startOff = (first.getDay() + 6) % 7;
  const gridStart = addDays(first, -startOff);
  const today = new Date();
  const cells = Array.from({length:42}, (_,i) => addDays(gridStart, i));

  return `
    <div class="flex-1 overflow-y-auto scrollbar-thin p-2 flex flex-col">
      <div class="grid grid-cols-7 mb-1 text-xs text-slate-500 text-center font-medium">
        ${['一','二','三','四','五','六','日'].map(d => `<div class="py-1">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7 gap-1 flex-1">
        ${cells.map(d => {
          const dateStr = fmtDate(d);
          const evs = state.events.filter(e => e.date === dateStr);
          const inMonth = d.getMonth() === c.getMonth();
          const isToday = sameDay(d, today);
          return `
            <div onclick="state.cursor=new Date('${dateStr}'); setView('day')"
                 class="bg-white rounded-md border ${isToday?'border-indigo-400':'border-slate-200'} p-1 cursor-pointer hover:bg-indigo-50 flex flex-col gap-0.5 min-h-0">
              <div class="text-xs ${inMonth?(isToday?'text-indigo-600 font-bold':'text-slate-700'):'text-slate-300'}">${d.getDate()}</div>
              <div class="flex-1 flex flex-col gap-0.5 overflow-hidden">
                ${evs.slice(0,3).map(ev => {
                  const cc = COLORS[ev.color] || COLORS.sky;
                  return `<div class="flex items-center gap-1 text-[10px] truncate ${ev.done?'opacity-60':''}">
                    <span class="w-1.5 h-1.5 rounded-full ${cc.dot} flex-shrink-0"></span>
                    <span class="truncate ${ev.done?'line-through text-slate-500':'text-slate-700'}">${escape(ev.title)}</span>
                  </div>`;
                }).join('')}
                ${evs.length > 3 ? `<div class="text-[10px] text-slate-400">+${evs.length-3}</div>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

// 编辑面板
function renderEditor() {
  const e = state.editing;
  return `
    <div class="fixed inset-0 z-40 bg-slate-900/40 flex items-end sm:items-center justify-center" onclick="closeEditor()">
      <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md shadow-2xl p-5" onclick="event.stopPropagation()">
        <div class="text-lg font-semibold mb-4 text-slate-800">${e._isNew?'新建事件':'编辑事件'}</div>

        <label class="text-xs text-slate-500">标题</label>
        <input id="ed_title" type="text" value="${escape(e.title)}" placeholder="做点什么?"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 mt-1 mb-3 focus:outline-none focus:border-indigo-500" />

        <label class="text-xs text-slate-500">日期</label>
        <input id="ed_date" type="date" value="${e.date}"
               class="w-full border border-slate-300 rounded-lg px-3 py-2 mt-1 mb-3 focus:outline-none focus:border-indigo-500" />

        <div class="grid grid-cols-2 gap-3 mb-3">
          <div>
            <label class="text-xs text-slate-500">开始</label>
            <input id="ed_start" type="time" value="${minToTime(e.start)}"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 mt-1 focus:outline-none focus:border-indigo-500" />
          </div>
          <div>
            <label class="text-xs text-slate-500">结束</label>
            <input id="ed_end" type="time" value="${minToTime(e.end)}"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2 mt-1 focus:outline-none focus:border-indigo-500" />
          </div>
        </div>

        <label class="text-xs text-slate-500">颜色</label>
        <div class="flex gap-2 mt-2 mb-5">
          ${Object.keys(COLORS).map(k => `
            <button onclick="state.editing.color='${k}'; render()"
                    class="w-8 h-8 rounded-full ${COLORS[k].dot} ${e.color===k?'ring-2 ring-offset-2 ring-slate-700':''}"></button>
          `).join('')}
        </div>

        <div class="flex gap-2">
          ${!e._isNew ? `<button onclick="deleteEditor()" class="flex-1 py-2.5 rounded-lg bg-rose-50 text-rose-600 font-medium hover:bg-rose-100">删除</button>` : ''}
          <button onclick="closeEditor()" class="flex-1 py-2.5 rounded-lg bg-slate-100 text-slate-700 font-medium hover:bg-slate-200">取消</button>
          <button onclick="commitEditor()" class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-medium hover:bg-indigo-700">保存</button>
        </div>
      </div>
    </div>
  `;
}
function commitEditor() {
  const t = document.getElementById('ed_title').value;
  const d = document.getElementById('ed_date').value;
  const s = document.getElementById('ed_start').value;
  const en = document.getElementById('ed_end').value;
  const toMin = (str) => { const [h,m] = str.split(':').map(Number); return h*60+m; };
  state.editing.title = t;
  state.editing.date = d;
  state.editing.start = toMin(s);
  state.editing.end = toMin(en);
  delete state.editing._isNew;
  saveEditor();
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

// ---------- 启动 ----------
window.openEditor = openEditor;
window.closeEditor = closeEditor;
window.commitEditor = commitEditor;
window.deleteEditor = deleteEditor;
