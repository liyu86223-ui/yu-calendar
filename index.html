      orange:  { light: 'bg-orange-50',  border: 'border-orange-300',  text: 'text-orange-700',  deep: 'bg-orange-200',  deepText: 'text-orange-900',  deepBorder: 'border-orange-400',  dot: 'bg-orange-400',  barLight: 'bg-orange-100' },
      stone:   { light: 'bg-stone-100',  border: 'border-stone-300',   text: 'text-stone-700',   deep: 'bg-stone-300',   deepText: 'text-stone-900',   deepBorder: 'border-stone-400',   dot: 'bg-stone-400',   barLight: 'bg-stone-200' },
      zinc:    { light: 'bg-zinc-100',   border: 'border-zinc-300',    text: 'text-zinc-700',    deep: 'bg-zinc-300',    deepText: 'text-zinc-900',    deepBorder: 'border-zinc-400',    dot: 'bg-zinc-400',    barLight: 'bg-zinc-200' },
      slate:   { light: 'bg-slate-100',  border: 'border-slate-300',   text: 'text-slate-700',   deep: 'bg-slate-300',   deepText: 'text-slate-900',   deepBorder: 'border-slate-400',   dot: 'bg-slate-400',   barLight: 'bg-slate-200' },

    const PALETTE_KEYS = Object.keys(COLOR_PALETTE);

    const DEFAULT_CATEGORIES = [
      { id: 'dance',   name: '跳舞', color: 'pink' },
      { id: 'fitness', name: '健身', color: 'sky' },
      { id: 'massage', name: '按摩', color: 'violet' },

    const initialEvents = [
      { id: 1, title: '晨间瑜伽',     category: 'fitness', date: '2026-05-18', endDate: '2026-05-18', start: 7,    end: 8,    completed: true,  location: 'Z+ 健身房',     who: '' },
      { id: 2, title: 'Hip-hop 入门', category: 'dance',   date: '2026-05-18', endDate: '2026-05-18', start: 19,   end: 20.5, completed: true,  location: 'JC 舞蹈工作室', who: 'Mira老师' },
      { id: 3, title: '力量训练',     category: 'fitness', date: '2026-05-19', endDate: '2026-05-19', start: 18.5, end: 20,   completed: true,  location: 'Z+ 健身房',     who: '' },
      { id: 9, title: 'K-pop 韩舞',   category: 'dance',   date: '2026-05-19', endDate: '2026-05-19', start: 12,   end: 13,   completed: false, location: '',              who: '' },
      { id: 10,title: '中医按摩',     category: 'massage', date: '2026-05-20', endDate: '2026-05-20', start: 12,   end: 13,   completed: false, location: '万寿路',         who: '' },
      { id: 4, title: 'Jazz 进阶',    category: 'dance',   date: '2026-05-20', endDate: '2026-05-20', start: 19,   end: 20.5, completed: false, location: 'JC 舞蹈工作室', who: 'Yuki老师' },
      { id: 11,title: '上海团建',     category: 'fun',     date: '2026-05-22', endDate: '2026-05-24', start: 14,   end: 18,   completed: false, location: '上海',           who: '团队' },
      { id: 6, title: '和小A 午餐',   category: 'meal',    date: '2026-05-21', endDate: '2026-05-21', start: 12,   end: 13.5, completed: false, location: '三里屯',         who: '小A' },
    ];

    const formatDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const formatTime = (h) => `${Math.floor(h)}:${String(Math.round((h%1)*60)).padStart(2,'0')}`;
    const floatToTimeStr = (f) => `${String(Math.floor(f)).padStart(2,'0')}:${String(Math.round((f%1)*60)).padStart(2,'0')}`;
    const timeStrToFloat = (s) => { const [h,m] = s.split(':').map(Number); return h + m/60; };
    const dayNames = ['一','二','三','四','五','六','日'];
    const monthDayLabels = ['周一','周二','周三','周四','周五','周六','周日'];

    const getSegment = (ev, dayStr) => {
      const startStr = ev.date;
      const endStr = ev.endDate || ev.date;
      if (dayStr < startStr || dayStr > endStr) return null;
      const isStart = dayStr === startStr;
      const isEnd = dayStr === endStr;
      return {
        start: isStart ? ev.start : START_HOUR,
        end: isEnd ? ev.end : END_HOUR + 1,
        isStart, isEnd,
        isMulti: startStr !== endStr,
      };
    };

    function PlannerApp() {
      const today = new Date(2026, 4, 20, 14, 30);
      const todayStr = formatDate(today);
      const [view, setView] = useState('week');
      const [weekOffset, setWeekOffset] = useState(0);
      const [monthOffset, setMonthOffset] = useState(0);
      const [selectedDay, setSelectedDay] = useState(today);
      const [isMobile, setIsMobile] = useState(false);
      const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
      const [events, setEvents] = useState(initialEvents);
      const [editing, setEditing] = useState(null);
      const [managingCats, setManagingCats] = useState(false);
      const [dragInfo, setDragInfo] = useState(null);

      const dragStateRef = useRef(null);
      const justDraggedRef = useRef(false);
      const gridRef = useRef(null);
      const weekStartRef = useRef(null);
      const viewRef = useRef(view);
      const selectedDayStrRef = useRef(formatDate(selectedDay));

      useEffect(() => {
        const check = () => setIsMobile(window.innerWidth < 768);
        check();
        window.addEventListener('resize', check);
        return () => window.removeEventListener('resize', check);
      }, []);

      useEffect(() => {
        if (isMobile && view === 'week') setView('month');
      }, [isMobile]);

      useEffect(() => { viewRef.current = view; });
      useEffect(() => { selectedDayStrRef.current = formatDate(selectedDay); });

      const weekStart = useMemo(() => {
        const d = new Date(today);
        const day = d.getDay() || 7;
        d.setDate(d.getDate() - day + 1 + weekOffset * 7);
        d.setHours(0,0,0,0);
        return d;
      }, [weekOffset]);
      useEffect(() => { weekStartRef.current = weekStart; });

      // 手机端日视图：左右滑动屏幕切日期
      useEffect(() => {
        if (!(isMobile && view === 'day')) return;
        const grid = gridRef.current;
        if (!grid) return;

        let startX = 0, startY = 0, startT = 0;
        let tracking = false;
        let decided = null; // 'h' | 'v' | null

        const onStart = (e) => {
          if (dragStateRef.current) return;
          if (e.touches.length !== 1) return;
          const t = e.touches[0];
          startX = t.clientX;
          startY = t.clientY;
          startT = Date.now();
          tracking = true;
          decided = null;
        };

        const onMove = (e) => {
          if (!tracking || decided) return;
          const t = e.touches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
            decided = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
          }
        };

        const onEnd = (e) => {
          if (!tracking) return;
          tracking = false;
          if (dragStateRef.current?.isDragging) return;
          if (decided !== 'h') return;

          const t = e.changedTouches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          const dt = Date.now() - startT;

          if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2 && dt < 600) {
            const d = new Date(selectedDay);
            d.setDate(d.getDate() + (dx < 0 ? 1 : -1));
            setSelectedDay(d);
          }
        };

        grid.addEventListener('touchstart', onStart, { passive: true });
        grid.addEventListener('touchmove', onMove, { passive: true });
        grid.addEventListener('touchend', onEnd);
        grid.addEventListener('touchcancel', onEnd);
        return () => {
          grid.removeEventListener('touchstart', onStart);
          grid.removeEventListener('touchmove', onMove);
          grid.removeEventListener('touchend', onEnd);
          grid.removeEventListener('touchcancel', onEnd);
        };
      }, [isMobile, view, selectedDay]);

      const weekDays = useMemo(() =>
        Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; }),
        [weekStart]
      );

      const monthInfo = useMemo(() => {
        const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
        const first = new Date(base);
        const dow = first.getDay() || 7;
        const calStart = new Date(first);
        calStart.setDate(calStart.getDate() - dow + 1);
        const weeks = [];
        for (let w = 0; w < 6; w++) {
          const arr = [];
          for (let d = 0; d < 7; d++) {
            const day = new Date(calStart);
            day.setDate(day.getDate() + w*7 + d);
            arr.push(day);
          }
          weeks.push(arr);
        }
        return { monthDate: base, weeks };
      }, [monthOffset]);

      const getCat = (id) => categories.find(c => c.id === id) || categories[0] || { name: '?', color: 'slate' };
      const getStyle = (catId) => COLOR_PALETTE[getCat(catId).color] || COLOR_PALETTE.slate;

      const displayEvents = useMemo(() => {
        if (!dragInfo?.isDragging || !dragInfo.target) return events;
        return events.map(e => {
          if (e.id !== dragInfo.id) return e;
          const dur = e.end - e.start;
          return { ...e, date: dragInfo.target.date, endDate: dragInfo.target.date, start: dragInfo.target.hour, end: dragInfo.target.hour + dur };
        });
      }, [events, dragInfo]);

      const weekEventsCount = useMemo(() => {
        let total = 0, done = 0;
        events.forEach(e => {
          const start = new Date(e.date);
          const end = new Date(e.endDate || e.date);
          const wEnd = new Date(weekStart.getTime() + 7*24*60*60*1000);
          if (end >= weekStart && start < wEnd) {
            total++;
            if (e.completed) done++;
          }
        });
        return { total, done };
      }, [events, weekStart]);

      const isMissed = (ev) => {
        if (ev.completed) return false;
        const endStr = ev.endDate || ev.date;
        const d = new Date(endStr);
        d.setHours(Math.floor(ev.end), (ev.end%1)*60, 0);
        return d < today;
      };

      useEffect(() => {
        const computeTarget = (clientX, clientY) => {
          const grid = gridRef.current;
          if (!grid) return null;
          const rect = grid.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top + grid.scrollTop;
          if (x < TIME_COL_WIDTH || x > rect.width) return null;
          let hour = START_HOUR + y / HOUR_HEIGHT;
          hour = Math.round(hour * 4) / 4;
          hour = Math.max(START_HOUR, Math.min(END_HOUR, hour));

          if (viewRef.current === 'day') {
            return { date: selectedDayStrRef.current, hour, dayIdx: 0 };
          }

          const dayWidth = (rect.width - TIME_COL_WIDTH) / 7;
          const dayIdx = Math.floor((x - TIME_COL_WIDTH) / dayWidth);
          if (dayIdx < 0 || dayIdx >= 7) return null;
          const date = new Date(weekStartRef.current);
          date.setDate(date.getDate() + dayIdx);
          return { date: formatDate(date), hour, dayIdx };
        };

        const onMove = (e) => {
          const s = dragStateRef.current;
          if (!s) return;
          const dist = Math.hypot(e.clientX - s.startX, e.clientY - s.startY);
          if (s.isTouch && !s.isDragging) {
            if (dist > 10) { clearTimeout(s.timer); dragStateRef.current = null; setDragInfo(null); }
            return;
          }
          if (!s.isTouch && !s.isDragging && dist > 4) s.isDragging = true;
          if (s.isDragging) {
            if (e.cancelable) e.preventDefault();
            s.target = computeTarget(e.clientX, e.clientY);
            setDragInfo({ ...s });
          }
        };

        const onUp = (e) => {
          const s = dragStateRef.current;
          if (!s) return;
          if (s.timer) clearTimeout(s.timer);
          if (s.isDragging) {
            const target = computeTarget(e.clientX, e.clientY);
            if (target) {
              const duration = s.ev.end - s.ev.start;
              let newStart = target.hour;
              let newEnd = newStart + duration;
              if (newEnd > END_HOUR + 1) {
                newEnd = END_HOUR + 1;
                newStart = Math.max(START_HOUR, newEnd - duration);
                newEnd = newStart + duration;
              }
              setEvents(prev => prev.map(ev =>
                ev.id === s.id ? { ...ev, date: target.date, endDate: target.date, start: newStart, end: newEnd } : ev
              ));
            }
            justDraggedRef.current = true;
            setTimeout(() => { justDraggedRef.current = false; }, 250);
          } else {
            setEvents(prev => prev.map(ev =>
              ev.id === s.id ? { ...ev, completed: !ev.completed } : ev
            ));
          }
          dragStateRef.current = null;
          setDragInfo(null);
        };

        window.addEventListener('pointermove', onMove, { passive: false });
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
        };
      }, []);

      const handleEventPointerDown = (e, ev) => {
        e.stopPropagation();
        const isMulti = (ev.endDate || ev.date) !== ev.date;
        if (isMulti) {
          e.preventDefault();
          const startX = e.clientX, startY = e.clientY;
          const onUp2 = (e2) => {
            const dist = Math.hypot(e2.clientX - startX, e2.clientY - startY);
            if (dist < 8) {
              setEvents(prev => prev.map(x => x.id === ev.id ? { ...x, completed: !x.completed } : x));
            }
            window.removeEventListener('pointerup', onUp2);
          };
          window.addEventListener('pointerup', onUp2);
          return;
        }
        const isTouch = e.pointerType === 'touch';
        const state = {
          id: ev.id, ev,
          startX: e.clientX, startY: e.clientY,
          isTouch, isDragging: false, timer: null, target: null,
        };
        dragStateRef.current = state;
        if (isTouch) {
          state.timer = setTimeout(() => {
            if (dragStateRef.current === state && !state.isDragging) {
              state.isDragging = true;
              if (navigator.vibrate) navigator.vibrate(20);
              setDragInfo({ ...state });
            }
          }, 280);
        }
      };

      const openNewEvent = (date, hour) => {
        const startH = hour != null ? Math.max(START_HOUR, Math.min(END_HOUR-1, hour)) : 19;
        const dStr = formatDate(date);
        setEditing({
          id: null, title: '',
          category: categories[0]?.id || 'other',
          date: dStr, endDate: dStr,
          start: startH, end: startH + 1,
          completed: false, location: '', who: '',
        });
      };

      const saveEvent = () => {
        if (!editing.title.trim()) return;
        if (editing.endDate < editing.date) return;
        if (editing.endDate === editing.date && editing.end <= editing.start) return;
        if (editing.id == null) {
          const newId = Math.max(0, ...events.map(e => e.id)) + 1;
          setEvents([...events, { ...editing, id: newId }]);
        } else {
          setEvents(events.map(e => e.id === editing.id ? editing : e));
        }
        setEditing(null);
      };

      const deleteEvent = () => {
        setEvents(events.filter(e => e.id !== editing.id));
        setEditing(null);
      };

      const onColumnClick = (e, day) => {
        if (justDraggedRef.current) return;
        if (!e.target.dataset || !e.target.dataset.empty) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const y = e.clientY - rect.top;
        const hour = Math.floor(y / HOUR_HEIGHT) + START_HOUR;
        openNewEvent(day, hour);
      };

      const updateCat = (id, patch) => setCategories(cs => cs.map(c => c.id === id ? { ...c, ...patch } : c));
      const deleteCat = (id) => {
        if (categories.length <= 1) return;
        const fb = categories.find(c => c.id !== id).id;
        setCategories(cs => cs.filter(c => c.id !== id));
        setEvents(es => es.map(e => e.category === id ? { ...e, category: fb } : e));
      };
      const addCat = () => {
        const newId = `cat_${Date.now()}`;
        const used = new Set(categories.map(c => c.color));
        const avail = PALETTE_KEYS.find(k => !used.has(k)) || 'slate';
        setCategories(cs => [...cs, { id: newId, name: '新分类', color: avail }]);
      };

      const computeWeekBars = (wDays) => {
        const wStart = formatDate(wDays[0]);
        const wEnd = formatDate(wDays[6]);
        const overlapping = events.filter(ev => {
          const eEnd = ev.endDate || ev.date;
          return ev.date <= wEnd && eEnd >= wStart;
        });
        overlapping.sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          const aLen = (new Date(a.endDate || a.date) - new Date(a.date));
          const bLen = (new Date(b.endDate || b.date) - new Date(b.date));
          if (aLen !== bLen) return bLen - aLen;
          return a.start - b.start;
        });
        const lanes = [];
        return overlapping.map(ev => {
          const evEnd = ev.endDate || ev.date;
          const sStr = ev.date < wStart ? wStart : ev.date;
          const eStr = evEnd > wEnd ? wEnd : evEnd;
          const startCol = wDays.findIndex(d => formatDate(d) === sStr);
          const endCol = wDays.findIndex(d => formatDate(d) === eStr);
          let lane = -1;
          for (let i = 0; i < lanes.length; i++) {
            if (lanes[i] < startCol) { lane = i; lanes[i] = endCol; break; }
          }
          if (lane === -1) { lane = lanes.length; lanes.push(endCol); }
          return { ev, startCol, endCol, lane };
        });
      };

      const hours = Array.from({length: END_HOUR-START_HOUR+1}, (_,i) => START_HOUR+i);
      const inputCls = "w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-rose-200 focus:border-rose-400";

      const isTimelineView = view === 'week' || view === 'day';
      const timelineDays = view === 'day' ? [selectedDay] : weekDays;

      const headerLabel = (() => {
        if (view === 'day') {
          const wd = (selectedDay.getDay() || 7) - 1;
          return `${selectedDay.getMonth()+1} 月 ${selectedDay.getDate()} 日 · 周${dayNames[wd]}`;
        }
        if (view === 'week') return `${weekStart.getFullYear()} 年 ${weekStart.getMonth()+1} 月`;
        return `${monthInfo.monthDate.getFullYear()} 年 ${monthInfo.monthDate.getMonth()+1} 月`;
      })();

      const goPrev = () => {
        if (view === 'day') {
          const d = new Date(selectedDay); d.setDate(d.getDate() - 1); setSelectedDay(d);
        } else if (view === 'week') setWeekOffset(o => o-1);
        else setMonthOffset(o => o-1);
      };
      const goNext = () => {
        if (view === 'day') {
          const d = new Date(selectedDay); d.setDate(d.getDate() + 1); setSelectedDay(d);
        } else if (view === 'week') setWeekOffset(o => o+1);
        else setMonthOffset(o => o+1);
      };
      const goToday = () => {
        if (view === 'day') setSelectedDay(today);
        else if (view === 'week') setWeekOffset(0);
        else setMonthOffset(0);
      };
      const offsetIsZero = view === 'day'
        ? formatDate(selectedDay) === todayStr
        : view === 'week' ? weekOffset === 0 : monthOffset === 0;

      const onMonthDayTap = (d) => {
        if (isMobile) {
          setSelectedDay(d);
          setView('day');
        } else {
          openNewEvent(d);
        }
      };

      return (
        <div className="w-full h-screen bg-slate-50 flex flex-col font-sans"
          style={{ touchAction: dragInfo?.isDragging ? 'none' : undefined,
                   userSelect: dragInfo?.isDragging ? 'none' : undefined }}>
          <div className="bg-white border-b border-slate-200 px-3 py-3 flex items-center justify-between shrink-0 gap-2">
            <div className="flex items-center gap-1 min-w-0">
              <button onClick={goPrev} className="p-1.5 hover:bg-slate-100 rounded-md transition shrink-0">
                <ChevronLeft className="w-5 h-5 text-slate-600" />
              </button>
              <div className="px-1 min-w-0">
                <div className="text-base font-semibold text-slate-800 truncate">{headerLabel}</div>
                {!offsetIsZero && (
                  <button onClick={goToday} className="text-xs text-rose-500 hover:text-rose-700">← 回到今天</button>
                )}
              </div>
              <button onClick={goNext} className="p-1.5 hover:bg-slate-100 rounded-md transition shrink-0">
                <ChevronRight className="w-5 h-5 text-slate-600" />
              </button>
            </div>

            <div className="flex items-center gap-1.5 shrink-0">
              <div className="flex bg-slate-100 rounded-full p-0.5">
                {isMobile ? (
                  <>
                    <button onClick={() => setView('month')}
                      className={`px-3 py-1 text-xs font-medium rounded-full transition ${
                        view === 'month' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                      }`}>月</button>
                    <button onClick={() => setView('day')}
                      className={`px-3 py-1 text-xs font-medium rounded-full transition ${
                        view === 'day' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                      }`}>日</button>
                  </>
                ) : (
                  <>
                    <button onClick={() => setView('week')}
                      className={`px-3 py-1 text-xs font-medium rounded-full transition ${
                        view === 'week' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                      }`}>周</button>
                    <button onClick={() => setView('month')}
                      className={`px-3 py-1 text-xs font-medium rounded-full transition ${
                        view === 'month' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                      }`}>月</button>
                  </>
                )}
              </div>

              {view === 'week' && (
                <div className="hidden md:flex items-center gap-2 text-sm bg-emerald-50 px-3 py-1.5 rounded-full border border-emerald-200">
                  <Sparkles className="w-4 h-4 text-emerald-500" />
                  <span className="font-bold text-emerald-600">{weekEventsCount.done}</span>
                  <span className="text-emerald-400">/ {weekEventsCount.total}</span>
                </div>
              )}
              <button onClick={() => setManagingCats(true)}
                className="p-1.5 hover:bg-slate-100 rounded-full text-slate-600 transition" title="管理分类">
                <Settings className="w-5 h-5" />
              </button>
              <button onClick={() => openNewEvent(view === 'day' ? selectedDay : today, 19)}
                className="flex items-center gap-1 bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded-full text-sm font-medium transition shadow-sm">
                <Plus className="w-4 h-4" strokeWidth={3} />
                <span className="hidden sm:inline">新建</span>
              </button>
            </div>
          </div>

          {isTimelineView && (
            <>
              <div className="bg-white border-b border-slate-200 flex shrink-0">
                <div style={{width: TIME_COL_WIDTH}} className="shrink-0"></div>
                {timelineDays.map((d, i) => {
                  const isToday = formatDate(d) === todayStr;
                  const wd = (d.getDay() || 7) - 1;
                  return (
                    <div key={i} className="flex-1 py-2 text-center border-l border-slate-100 min-w-0">
                      <div className="text-xs text-slate-500">周{dayNames[wd]}</div>
                      <div className="mt-1 flex justify-center">
                        <div className={`text-sm font-semibold w-7 h-7 flex items-center justify-center rounded-full ${
                          isToday ? 'text-white bg-rose-500' : 'text-slate-800'
                        }`}>{d.getDate()}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div ref={gridRef} className="flex-1 overflow-y-auto">
                <div className="flex relative">
                  <div style={{width: TIME_COL_WIDTH}} className="shrink-0">
                    {hours.map(h => (
                      <div key={h} style={{height:HOUR_HEIGHT}} className="text-xs text-slate-400 text-right pr-2 -translate-y-2">
                        {h}:00
                      </div>
                    ))}
                  </div>

                  {timelineDays.map((d, dayIdx) => {
                    const dStr = formatDate(d);
                    const isToday = dStr === todayStr;

                    return (
                      <div
                        key={dayIdx}
                        data-empty="true"
                        onClick={(e) => onColumnClick(e, d)}
                        className={`flex-1 border-l border-slate-100 relative cursor-pointer min-w-0 ${isToday ? 'bg-rose-50/30' : ''}`}
                      >
                        {hours.map(h => (
                          <div key={h} data-empty="true" style={{height:HOUR_HEIGHT}} className="border-b border-slate-100"></div>
                        ))}

                        {displayEvents.map(ev => {
                          const seg = getSegment(ev, dStr);
                          if (!seg) return null;
                          const top = (seg.start - START_HOUR) * HOUR_HEIGHT;
                          const height = (seg.end - seg.start) * HOUR_HEIGHT;
                          const style = getStyle(ev.category);
                          const missed = isMissed(ev);
                          const isBeingDragged = dragInfo?.isDragging && dragInfo.id === ev.id;

                          let cardCls = '', circleCls = '';
                          if (missed) {
                            cardCls = 'bg-slate-100 text-slate-400 border border-slate-200';
                            circleCls = 'border-2 border-slate-300';
                          } else if (ev.completed) {
                            cardCls = `${style.deep} ${style.deepText} border ${style.deepBorder}`;
                            circleCls = `${style.dot} border-2 ${style.deepBorder}`;
                          } else {
                            cardCls = `${style.light} ${style.text} border ${style.border}`;
                            circleCls = `border-2 ${style.border} bg-white/60`;
                          }

                          const roundCls = seg.isMulti
                            ? `${seg.isStart ? 'rounded-t-lg' : ''} ${seg.isEnd ? 'rounded-b-lg' : ''}`
                            : 'rounded-lg';

                          const showLocation = ev.location && height >= 70 && seg.isStart;
                          const showWho = ev.who && height >= (showLocation ? 90 : 70) && seg.isStart;

                          return (
                            <div
                              key={`${ev.id}-${dStr}`}
                              onPointerDown={(e) => handleEventPointerDown(e, ev)}
                              onDoubleClick={(e) => { e.stopPropagation(); setEditing({ ...ev }); }}
                              style={{ top, height: height-3, touchAction: 'none' }}
                              className={`absolute left-1 right-1 ${roundCls} p-2 pr-7 text-left select-none ${cardCls} ${
                                isBeingDragged ? 'shadow-lg ring-2 ring-rose-400' : ''
                              }`}
                            >
                              {seg.isEnd && (
                                <div className={`absolute top-1.5 right-1.5 w-5 h-5 rounded-full flex items-center justify-center transition-colors ${circleCls}`}>
                                  {ev.completed && <Check className="w-3 h-3 text-white" strokeWidth={4} />}
                                </div>
                              )}

                              {seg.isStart && (
                                <>
                                  <div className={`text-xs font-semibold truncate ${missed ? 'line-through' : ''}`}>
                                    {ev.title}
                                    {seg.isMulti && <span className="ml-1 opacity-60">→</span>}
                                  </div>
                                  <div className="text-xs opacity-75 truncate mt-0.5">
                                    {formatTime(ev.start)}{seg.isMulti ? ` 起` : ` - ${formatTime(ev.end)}`}
                                  </div>
                                  {showLocation && (
                                    <div className="text-xs truncate mt-1 flex items-center opacity-80">
                                      <MapPin className="w-3 h-3 shrink-0" strokeWidth={1.75} />
                                      <span className="ml-1 truncate">{ev.location}</span>
                                    </div>
                                  )}
                                  {showWho && (
                                    <div className="text-xs truncate mt-0.5 flex items-center opacity-80">
                                      <Users className="w-3 h-3 shrink-0" strokeWidth={1.75} />
                                      <span className="ml-1 truncate">{ev.who}</span>
                                    </div>
                                  )}
                                </>
                              )}
                              {!seg.isStart && (
                                <div className="text-xs font-medium opacity-70 truncate">
                                  <span className="opacity-60">←</span> {ev.title}
                                  {!seg.isEnd && <span className="ml-1 opacity-60">→</span>}
                                </div>
                              )}
                              {!seg.isStart && seg.isEnd && (
                                <div className="text-xs opacity-75 truncate mt-0.5">截止 {formatTime(ev.end)}</div>
                              )}
                            </div>
                          );
                        })}

                        {isToday && (() => {
                          const nowHour = today.getHours() + today.getMinutes()/60;
                          if (nowHour >= START_HOUR && nowHour <= END_HOUR) {
                            const top = (nowHour-START_HOUR)*HOUR_HEIGHT;
                            return (
                              <div style={{top}} className="absolute left-0 right-0 z-10 pointer-events-none">
                                <div className="h-0.5 bg-rose-500 relative">
                                  <div className="absolute -left-1 -top-1 w-2.5 h-2.5 rounded-full bg-rose-500"></div>
                                </div>
                              </div>
                            );
                          }
                          return null;
                        })()}
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}

          {view === 'month' && (
            <>
              <div className="bg-white border-b border-slate-200 grid grid-cols-7 shrink-0">
                {monthDayLabels.map((l, i) => (
                  <div key={i} className="py-2 text-center text-xs text-slate-500 border-l border-slate-100 first:border-l-0">{l}</div>
                ))}
              </div>
              <div className="flex-1 overflow-y-auto">
                <div className="flex flex-col h-full">
                  {monthInfo.weeks.map((wDays, wIdx) => {
                    const bars = computeWeekBars(wDays);
                    const laneCap = 3;
                    const overflow = wDays.map((d, di) => {
                      const dStr = formatDate(d);
                      return bars.filter(b => b.lane >= laneCap && b.startCol <= di && b.endCol >= di && (b.ev.date <= dStr && (b.ev.endDate || b.ev.date) >= dStr)).length;
                    });

                    return (
                      <div key={wIdx} className="flex-1 grid grid-cols-7 relative border-b border-slate-100 last:border-b-0 min-h-0">
                        {wDays.map((d, di) => {
                          const dStr = formatDate(d);
                          const isToday = dStr === todayStr;
                          const inMonth = d.getMonth() === monthInfo.monthDate.getMonth();
                          return (
                            <div
                              key={di}
                              onClick={(e) => {
                                if (e.target === e.currentTarget || e.target.dataset.empty) onMonthDayTap(d);
                              }}
                              className={`relative border-l border-slate-100 first:border-l-0 cursor-pointer hover:bg-slate-50 transition ${
                                !inMonth ? 'bg-slate-50/50' : ''
                              } ${isToday ? 'bg-rose-50/40' : ''}`}
                              data-empty="true"
                            >
                              <div className="flex justify-end p-1.5" data-empty="true">
                                <div className={`text-xs w-6 h-6 flex items-center justify-center rounded-full font-medium ${
                                  isToday ? 'bg-rose-500 text-white' :
                                  inMonth ? 'text-slate-700' : 'text-slate-400'
                                }`}>{d.getDate()}</div>
                              </div>
                              <div data-empty="true" style={{ height: laneCap * 22 + (overflow[di] > 0 ? 18 : 0) }}></div>
                              {overflow[di] > 0 && (
                                <button
                                  onClick={(e) => {
                                    e.stopPropagation();
                                    if (isMobile) {
                                      setSelectedDay(d);
                                      setView('day');
                                    } else {
                                      const w = new Date(wDays[0]);
                                      const today0 = new Date(today.getFullYear(), today.getMonth(), today.getDate());
                                      const baseMonday = new Date(today0);
                                      const bd = baseMonday.getDay() || 7;
                                      baseMonday.setDate(baseMonday.getDate() - bd + 1);
                                      const diffWeeks = Math.round((w - baseMonday) / (7*24*60*60*1000));
                                      setWeekOffset(diffWeeks);
                                      setView('week');
                                    }
                                  }}
                                  className="absolute left-1 right-1 text-xs text-slate-500 hover:text-rose-600 text-left px-1.5 py-0.5"
                                  style={{ top: 28 + laneCap * 22 }}
                                >
                                  +{overflow[di]} 更多
                                </button>
                              )}
                            </div>
                          );
                        })}
                        {bars.filter(b => b.lane < laneCap).map((bar, idx) => {
                          const style = getStyle(bar.ev.category);
                          const missed = isMissed(bar.ev);
                          const top = 28 + bar.lane * 22;
                          const leftPct = (bar.startCol / 7) * 100;
                          const widthPct = ((bar.endCol - bar.startCol + 1) / 7) * 100;
                          let cls = '';
                          if (missed) cls = 'bg-slate-200 text-slate-400 line-through';
                          else if (bar.ev.completed) cls = `${style.deep} ${style.deepText}`;
                          else cls = `${style.barLight} ${style.text}`;
                          return (
                            <button
                              key={`${bar.ev.id}-${idx}`}
                              onClick={(e) => {
                                e.stopPropagation();
                                if (isMobile) {
                                  const targetDate = new Date(bar.ev.date);
                                  setSelectedDay(targetDate);
                                  setView('day');
                                } else {
                                  setEditing({ ...bar.ev });
                                }
                              }}
                              className={`absolute rounded text-xs font-medium px-1.5 py-0.5 truncate text-left ${cls}`}
                              style={{
                                top,
                                left: `calc(${leftPct}% + 4px)`,
                                width: `calc(${widthPct}% - 8px)`,
                                height: 18,
                              }}
                              title={bar.ev.title}
                            >
                              {bar.ev.completed && '✓ '}
                              {bar.startCol === bar.endCol && (
                                <span className="opacity-60 mr-1">{formatTime(bar.ev.start)}</span>
                              )}
                              {bar.ev.title}
                            </button>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}

          <div className="bg-white border-t border-slate-200 px-3 py-2 flex items-center gap-3 text-xs text-slate-600 shrink-0 flex-wrap">
            {categories.map(c => (
              <div key={c.id} className="flex items-center gap-1.5">
                <div className={`w-2.5 h-2.5 rounded-full ${COLOR_PALETTE[c.color].dot}`}></div>
                <span>{c.name}</span>
              </div>
            ))}
          </div>

          {editing && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 overflow-y-auto"
              onClick={() => setEditing(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md my-auto" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 pt-4 pb-2">
                  <h2 className="text-lg font-semibold text-slate-800">
                    {editing.id == null ? '新建事项' : '编辑事项'}
                  </h2>
                  <button onClick={() => setEditing(null)} className="p-1 hover:bg-slate-100 rounded-md">
                    <X className="w-5 h-5 text-slate-500" />
                  </button>
                </div>

                <div className="px-5 pb-4 space-y-3">
                  <div>
                    <label className="text-xs font-medium text-slate-500 mb-1 block">事项名称</label>
                    <input autoFocus className={inputCls}
                      value={editing.title}
                      onChange={e => setEditing({...editing, title: e.target.value})}
                    />
                  </div>

                  <div>
                    <div className="flex items-center justify-between mb-1">
                      <label className="text-xs font-medium text-slate-500">分类</label>
                      <button onClick={() => setManagingCats(true)}
                        className="text-xs text-rose-500 hover:text-rose-700">+ 管理分类</button>
                    </div>
                    <div className="grid grid-cols-3 gap-1.5">
                      {categories.map(c => {
                        const selected = editing.category === c.id;
                        const style = COLOR_PALETTE[c.color];
                        return (
                          <button key={c.id}
                            onClick={() => setEditing({...editing, category: c.id})}
                            className={`flex items-center gap-1.5 px-2 py-1.5 rounded-lg border text-sm transition ${
                              selected ? `${style.light} ${style.text} ${style.border} ring-2 ring-offset-1 ring-rose-300 font-medium`
                                       : 'bg-white border-slate-200 text-slate-600 hover:border-slate-300'
                            }`}>
                            <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${style.dot}`}></div>
                            <span className="truncate">{c.name}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-xs font-medium text-slate-500 mb-1 block">开始日期</label>
                      <input type="date" className={inputCls}
                        value={editing.date}
                        onChange={e => {
                          const newDate = e.target.value;
                          const newEnd = editing.endDate < newDate ? newDate : editing.endDate;
                          setEditing({...editing, date: newDate, endDate: newEnd});
                        }}
                      />
                    </div>
                    <div>
                      <label className="text-xs font-medium text-slate-500 mb-1 block">结束日期</label>
                      <input type="date" className={inputCls}
                        min={editing.date}
                        value={editing.endDate}
                        onChange={e => setEditing({...editing, endDate: e.target.value})}
                      />
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="text-xs font-medium text-slate-500 mb-1 block">开始时间</label>
                      <input type="time" className={inputCls}
                        value={floatToTimeStr(editing.start)}
                        onChange={e => setEditing({...editing, start: timeStrToFloat(e.target.value)})}
                      />
                    </div>
                    <div>
                      <label className="text-xs font-medium text-slate-500 mb-1 block">结束时间</label>
                      <input type="time" className={inputCls}
                        value={floatToTimeStr(editing.end)}
                        onChange={e => setEditing({...editing, end: timeStrToFloat(e.target.value)})}
                      />
                    </div>
                  </div>

                  {editing.endDate !== editing.date && (
                    <div className="text-xs text-slate-500 bg-slate-50 rounded-md px-3 py-1.5 border border-slate-200">
                      跨天事项：{editing.date} {floatToTimeStr(editing.start)} → {editing.endDate} {floatToTimeStr(editing.end)}
                    </div>
                  )}

                  <div>
                    <label className="text-xs font-medium text-slate-500 mb-1 flex items-center gap-1.5">
                      <MapPin className="w-3.5 h-3.5" strokeWidth={1.75} />
                      <span>地点</span>
                    </label>
                    <input className={inputCls}
                      value={editing.location}
                      onChange={e => setEditing({...editing, location: e.target.value})}
                    />
                  </div>

                  <div>
                    <label className="text-xs font-medium text-slate-500 mb-1 flex items-center gap-1.5">
                      <Users className="w-3.5 h-3.5" strokeWidth={1.75} />
                      <span>和谁</span>
                    </label>
                    <input className={inputCls}
                      value={editing.who}
                      onChange={e => setEditing({...editing, who: e.target.value})}
                    />
                  </div>
                </div>

                <div className="flex items-center justify-between px-5 py-3 bg-slate-50 rounded-b-2xl">
                  {editing.id != null ? (
                    <button onClick={deleteEvent}
                      className="flex items-center gap-1 text-rose-500 hover:text-rose-700 text-sm px-2 py-1.5 rounded-md hover:bg-rose-50">
                      <Trash2 className="w-4 h-4" /> 删除
                    </button>
                  ) : <div />}
                  <div className="flex gap-2">
                    <button onClick={() => setEditing(null)}
                      className="px-4 py-1.5 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">取消</button>
                    <button onClick={saveEvent} disabled={!editing.title.trim()}
                      className="px-4 py-1.5 text-sm bg-rose-500 hover:bg-rose-600 text-white rounded-lg font-medium disabled:opacity-50 disabled:cursor-not-allowed">
                      保存
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {managingCats && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 overflow-y-auto"
              onClick={() => setManagingCats(false)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md my-auto" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between px-5 pt-4 pb-2">
                  <h2 className="text-lg font-semibold text-slate-800">管理分类</h2>
                  <button onClick={() => setManagingCats(false)} className="p-1 hover:bg-slate-100 rounded-md">
                    <X className="w-5 h-5 text-slate-500" />
                  </button>
                </div>
                <div className="px-5 pb-3 space-y-2 max-h-96 overflow-y-auto">
                  {categories.map(c => {
                    const style = COLOR_PALETTE[c.color];
                    return (
                      <div key={c.id} className={`border rounded-lg p-3 ${style.light} ${style.border}`}>
                        <div className="flex items-center gap-2 mb-2">
                          <div className={`w-3 h-3 rounded-full ${style.dot} shrink-0`}></div>
                          <input value={c.name}
                            onChange={e => updateCat(c.id, { name: e.target.value })}
                            className="flex-1 px-2 py-1 bg-white/70 border border-white rounded text-sm focus:outline-none focus:ring-1 focus:ring-rose-300"
                          />
                          <button onClick={() => deleteCat(c.id)}
                            disabled={categories.length <= 1}
                            className="text-rose-500 hover:bg-white/50 p-1 rounded disabled:opacity-30 disabled:cursor-not-allowed">
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </div>
                        <div className="grid grid-cols-10 gap-1.5">
                          {PALETTE_KEYS.map(ck => {
                            const ps = COLOR_PALETTE[ck];
                            const selected = c.color === ck;
                            return (
                              <button key={ck} onClick={() => updateCat(c.id, { color: ck })}
                                className={`aspect-square rounded-full ${ps.dot} transition ${
                                  selected ? 'ring-2 ring-offset-2 ring-slate-700 scale-110' : 'hover:scale-110'
                                }`}
                              />
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                  <button onClick={addCat}
                    className="w-full border-2 border-dashed border-slate-300 rounded-lg py-2.5 text-slate-500 hover:bg-slate-50 hover:border-slate-400 text-sm flex items-center justify-center gap-1 transition">
                    <Plus className="w-4 h-4" /> 添加新分类
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PlannerApp />);
  </script>
</body>
</html>
