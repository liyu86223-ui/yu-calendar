    const getSegment = (ev, dayStr) => {
      const startStr = ev.date;
      const endStr = ev.endDate || ev.date;
      if (dayStr < startStr || dayStr > endStr) return null;
      const isStart = dayStr === startStr;
      const isEnd = dayStr === endStr;
      return {
        start: isStart ? ev.start : START_HOUR,
        end: isEnd ? ev.end : END_HOUR + 1,
        isStart, isEnd,
        isMulti: startStr !== endStr,
      };
    };

    /* ===== 持久化 ===== */
    const loadStored = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (!data || typeof data !== 'object') return null;
        return data;
      } catch { return null; }
    };

    const loadTheme = () => {
      try {
        const v = localStorage.getItem(THEME_KEY);
        if (v === 'dark') return true;
        if (v === 'light') return false;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      } catch { return false; }
    };

    /* ===== Gist 同步 ===== */
    async function gistFetch(token, gistId) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
        },
        cache: 'no-store',
      });
      if (res.status === 401) throw new Error('Token 无效或已过期');
      if (res.status === 404) throw new Error('找不到 Gist（ID 是否正确？）');
      if (!res.ok) throw new Error(`拉取失败 (${res.status})`);
      const data = await res.json();
      const file = data.files?.[GIST_FILENAME];
      if (!file) throw new Error('Gist 内未找到数据文件');
      try {
        return JSON.parse(file.content);
      } catch {
        throw new Error('Gist 数据格式损坏');
      }
    }

    async function gistUpdate(token, gistId, payload) {
      const res = await fetch(`https://api.github.com/gists/${gistId}`, {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } },
        }),
      });
      if (res.status === 401) throw new Error('Token 无效或已过期');
      if (res.status === 404) throw new Error('找不到 Gist');
      if (!res.ok) throw new Error(`推送失败 (${res.status})`);
      return res.json();
    }

    async function gistCreate(token, payload) {
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          description: '我的日程 - Planner Data',
          public: false,
          files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } },
        }),
      });
      if (res.status === 401) throw new Error('Token 无效（请确认勾选了 gist 权限）');
      if (!res.ok) throw new Error(`创建 Gist 失败 (${res.status})`);
      return res.json();
    }

    /* ===================== App ===================== */

      const [monthOffset, setMonthOffset] = useState(0);
      const [selectedDay, setSelectedDay] = useState(today);
      const [isMobile, setIsMobile] = useState(false);

      const [categories, setCategories] = useState(() => {
        const s = loadStored();
        return (s && Array.isArray(s.categories) && s.categories.length) ? s.categories : DEFAULT_CATEGORIES;
      });
      const [events, setEvents] = useState(() => {
        const s = loadStored();
        return (s && Array.isArray(s.events)) ? s.events : [];
      });
      const [darkMode, setDarkMode] = useState(loadTheme);

      const [editing, setEditing] = useState(null);
      const [managingCats, setManagingCats] = useState(false);
      const [colorPickerFor, setColorPickerFor] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [confirmModal, setConfirmModal] = useState(null);
      const [toast, setToast] = useState(null);
      const [eventMenu, setEventMenu] = useState(null);
      const [dragInfo, setDragInfo] = useState(null);
      const [clipboardEvent, setClipboardEvent] = useState(null);

      /* ===== 同步状态 ===== */
      const [syncToken, setSyncToken] = useState(() => {
        try { return localStorage.getItem(SYNC_TOKEN_KEY) || ''; } catch { return ''; }
      });
      const [syncGistId, setSyncGistId] = useState(() => {
        try { return localStorage.getItem(SYNC_GIST_ID_KEY) || ''; } catch { return ''; }
      });
      const [syncStatus, setSyncStatus] = useState('idle');
      const [syncError, setSyncError] = useState(null);
      const [lastSyncAt, setLastSyncAt] = useState(null);
      const [setupOpen, setSetupOpen] = useState(false);
      const [setupTokenInput, setSetupTokenInput] = useState('');
      const [setupGistIdInput, setSetupGistIdInput] = useState('');
      const [setupBusy, setSetupBusy] = useState(false);
      const [setupError, setSetupError] = useState(null);

      const dragStateRef = useRef(null);
      const justDraggedRef = useRef(false);
      const gridRef = useRef(null);
      const weekStartRef = useRef(null);
      const viewRef = useRef(view);
      const selectedDayStrRef = useRef(formatDate(selectedDay));
      const fileInputRef = useRef(null);
      const firstSaveSkipRef = useRef(true);
      const toastTimerRef = useRef(null);

      const pushTimerRef = useRef(null);
      const skipNextPushRef = useRef(false);
      const initialSyncDoneRef = useRef(false);
      const syncTokenRef = useRef(syncToken);
      const syncGistIdRef = useRef(syncGistId);
      const isPushingRef = useRef(false);

      useEffect(() => { syncTokenRef.current = syncToken; });
      useEffect(() => { syncGistIdRef.current = syncGistId; });

      const showToast = useCallback((msg, opts = {}) => {
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        setToast({ msg, ...opts });
        const dur = opts.duration || 2200;
        toastTimerRef.current = setTimeout(() => setToast(null), dur);
      }, []);

      /* ===== ESC 取消粘贴模式 ===== */
      useEffect(() => {
        if (!clipboardEvent) return;
        const onKey = (e) => { if (e.key === 'Escape') setClipboardEvent(null); };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [clipboardEvent]);

      /* ===== 同步：推送 ===== */
      const doPush = useCallback(async () => {
        const token = syncTokenRef.current;
        const gistId = syncGistIdRef.current;
        if (!token || !gistId) return;
        if (isPushingRef.current) return;
        isPushingRef.current = true;
        setSyncStatus('syncing');
        try {
          const stored = loadStored();
          if (!stored) { isPushingRef.current = false; setSyncStatus('synced'); return; }
          await gistUpdate(token, gistId, stored);
          setSyncStatus('synced');
          setSyncError(null);
          setLastSyncAt(new Date());
        } catch (err) {
          console.error('Push failed:', err);
          setSyncStatus('error');
          setSyncError(err.message);
        } finally {
          isPushingRef.current = false;
        }
      }, []);

      /* ===== 持久化：写入 + 触发同步 ===== */
      useEffect(() => {
        if (firstSaveSkipRef.current) { firstSaveSkipRef.current = false; return; }
        const savedAt = new Date().toISOString();
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            events, categories, savedAt, version: 1,
          }));
        } catch (e) {}

        if (skipNextPushRef.current) { skipNextPushRef.current = false; return; }
        if (!syncTokenRef.current || !syncGistIdRef.current) return;

        if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
        setSyncStatus('pending');
        pushTimerRef.current = setTimeout(() => { doPush(); }, PUSH_DEBOUNCE_MS);
      }, [events, categories, doPush]);

      /* ===== 同步：拉取 ===== */
      const doPull = useCallback(async (opts = {}) => {
        const token = syncTokenRef.current;
        const gistId = syncGistIdRef.current;
        if (!token || !gistId) return;
        setSyncStatus('syncing');
        try {
          const remote = await gistFetch(token, gistId);
          const local = loadStored();
          const remoteTime = remote?.savedAt ? new Date(remote.savedAt).getTime() : 0;
          const localTime = local?.savedAt ? new Date(local.savedAt).getTime() : 0;

          if (remoteTime > localTime) {
            skipNextPushRef.current = true;
            const remoteCats = Array.isArray(remote.categories) && remote.categories.length
              ? remote.categories : DEFAULT_CATEGORIES;
            const remoteEvents = Array.isArray(remote.events) ? remote.events : [];
            setCategories(remoteCats);
            setEvents(remoteEvents);
            try {
              localStorage.setItem(STORAGE_KEY, JSON.stringify({
                events: remoteEvents, categories: remoteCats,
                savedAt: remote.savedAt, version: 1,
              }));
            } catch {}
            setSyncStatus('synced');
            setLastSyncAt(new Date());
            setSyncError(null);
            if (opts.notify) showToast('已从云端拉取最新数据');
          } else if (localTime > remoteTime) {
            await gistUpdate(token, gistId, local);
            setSyncStatus('synced');
            setLastSyncAt(new Date());
            setSyncError(null);
            if (opts.notify) showToast('本地数据较新，已推送到云端');
          } else {
            setSyncStatus('synced');
            setLastSyncAt(new Date());
            setSyncError(null);
            if (opts.notify) showToast('已是最新');
          }
        } catch (err) {
          console.error('Pull failed:', err);
          setSyncStatus('error');
          setSyncError(err.message);
          if (opts.notify) showToast('同步失败：' + err.message);
        }
      }, [showToast]);

      /* ===== 首次加载：拉一次 ===== */
      useEffect(() => {
        if (initialSyncDoneRef.current) return;
        initialSyncDoneRef.current = true;
        if (syncToken && syncGistId) {
          doPull();
        } else if (!syncToken) {
          const skipped = (() => {
            try { return localStorage.getItem(SYNC_SKIPPED_KEY) === '1'; } catch { return false; }
          })();
          if (!skipped) {
            setTimeout(() => setSetupOpen(true), 400);
          } else {
            setSyncStatus('disabled');
          }
        }
        // eslint-disable-next-line
      }, []);

      /* ===== 主题持久化 ===== */
      useEffect(() => {
        const root = document.documentElement;
        if (darkMode) root.classList.add('dark');
        else root.classList.remove('dark');
        try { localStorage.setItem(THEME_KEY, darkMode ? 'dark' : 'light'); } catch {}
      }, [darkMode]);

      useEffect(() => {
        const check = () => setIsMobile(window.innerWidth < 768);
        check();
        window.addEventListener('resize', check);
        return () => window.removeEventListener('resize', check);
      }, []);

      useEffect(() => {
        if (isMobile && view === 'week') setView('month');
      }, [isMobile]);

      useEffect(() => { viewRef.current = view; });
      useEffect(() => { selectedDayStrRef.current = formatDate(selectedDay); });

      const weekStart = useMemo(() => {
        const d = new Date(today);
        const day = d.getDay() || 7;
        d.setDate(d.getDate() - day + 1 + weekOffset * 7);
        d.setHours(0,0,0,0);
        return d;
      }, [weekOffset]);
      useEffect(() => { weekStartRef.current = weekStart; });

      useEffect(() => {
        if (view !== 'week' && view !== 'day') return;
        const grid = gridRef.current;
        if (!grid) return;
        const target = (DEFAULT_SCROLL_HOUR - START_HOUR) * HOUR_HEIGHT;
        requestAnimationFrame(() => { grid.scrollTop = target; });
      }, [view]);

      useEffect(() => {
        if (!(isMobile && view === 'day')) return;
        const grid = gridRef.current;
        if (!grid) return;

        let startX = 0, startY = 0, startT = 0;
        let tracking = false;
        let decided = null;

        const onStart = (e) => {
          if (dragStateRef.current) return;
          if (e.touches.length !== 1) return;
          const t = e.touches[0];
          startX = t.clientX; startY = t.clientY; startT = Date.now();
          tracking = true; decided = null;
        };
        const onMove = (e) => {
          if (!tracking || decided) return;
          const t = e.touches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
            decided = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
          }
        };
        const onEnd = (e) => {
          if (!tracking) return;
          tracking = false;
          if (dragStateRef.current?.isDragging) return;
          if (decided !== 'h') return;
          const t = e.changedTouches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          const dt = Date.now() - startT;
          if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.2 && dt < 600) {
            const d = new Date(selectedDay);
            d.setDate(d.getDate() + (dx < 0 ? 1 : -1));
            setSelectedDay(d);
          }
        };

        grid.addEventListener('touchstart', onStart, { passive: true });
        grid.addEventListener('touchmove', onMove, { passive: true });
        grid.addEventListener('touchend', onEnd);
        grid.addEventListener('touchcancel', onEnd);
        return () => {
          grid.removeEventListener('touchstart', onStart);
          grid.removeEventListener('touchmove', onMove);
          grid.removeEventListener('touchend', onEnd);
          grid.removeEventListener('touchcancel', onEnd);
        };
      }, [isMobile, view, selectedDay]);

      const weekDays = useMemo(() =>
        Array.from({length:7}, (_,i) => { const d = new Date(weekStart); d.setDate(d.getDate()+i); return d; }),
        [weekStart]
      );

      const monthInfo = useMemo(() => {
        const base = new Date(today.getFullYear(), today.getMonth() + monthOffset, 1);
        const first = new Date(base);
        const dow = first.getDay() || 7;
        const calStart = new Date(first);
        calStart.setDate(calStart.getDate() - dow + 1);
        const weeks = [];
        for (let w = 0; w < 6; w++) {
          const arr = [];
          for (let d = 0; d < 7; d++) {
            const day = new Date(calStart);
            day.setDate(day.getDate() + w*7 + d);
            arr.push(day);
          }
          weeks.push(arr);
        }
        return { monthDate: base, weeks };
      }, [monthOffset]);

      const getCat = (id) => categories.find(c => c.id === id) || categories[0] || { name: '?', color: 'slate' };
      const getStyle = (catId) => COLOR_PALETTE[getCat(catId).color] || COLOR_PALETTE.slate;

      const displayEvents = useMemo(() => {
        if (!dragInfo?.isDragging || !dragInfo.target) return events;
        return events.map(e => {
          if (e.id !== dragInfo.id) return e;
          const dur = e.end - e.start;
          return { ...e, date: dragInfo.target.date, endDate: dragInfo.target.date, start: dragInfo.target.hour, end: dragInfo.target.hour + dur };
        });
      }, [events, dragInfo]);

      const weekEventsCount = useMemo(() => {
        let total = 0, done = 0;
        events.forEach(e => {
          const start = new Date(e.date);
          const end = new Date(e.endDate || e.date);
          const wEnd = new Date(weekStart.getTime() + 7*24*60*60*1000);
          if (end >= weekStart && start < wEnd) {
            total++;
            if (e.completed) done++;
          }
        });
        return { total, done };
      }, [events, weekStart]);

      const isMissed = (ev) => {
        if (ev.completed) return false;
        const endStr = ev.endDate || ev.date;
        const d = new Date(endStr);
        d.setHours(Math.floor(ev.end), (ev.end%1)*60, 0);
        return d < new Date();
      };

      const toggleComplete = (id) => {
        setEvents(prev => prev.map(e => e.id === id ? { ...e, completed: !e.completed } : e));
      };

      const deleteEventById = (id) => {
        const ev = events.find(e => e.id === id);
        if (!ev) return;
        setEvents(prev => prev.filter(e => e.id !== id));
        showToast(`已删除"${ev.title}"`, {
          duration: 5000,
          undo: () => {
            setEvents(prev => [...prev, ev]);
            setToast(null);
          },
        });
      };

      const openEventMenu = (id, x, y) => {
        setEventMenu({ id, x, y });
      };

      /* ===== 粘贴函数 ===== */
      const pasteClipboard = (dateStr, startHour = null) => {
        if (!clipboardEvent) return;
        const src = clipboardEvent;
        const dur = src.end - src.start;
        let newStart = startHour != null ? startHour : src.start;
        let newEnd = newStart + dur;
        if (newEnd > END_HOUR + 1) {
          newEnd = END_HOUR + 1;
          newStart = Math.max(START_HOUR, newEnd - dur);
        }
        const newId = Math.max(0, ...events.map(e => e.id)) + 1;
        setEvents(prev => [...prev, {
          ...src,
          id: newId,
          date: dateStr,
          endDate: dateStr,
          start: newStart,
          end: newEnd,
          completed: false,
        }]);
        showToast(`已粘贴"${src.title}"到 ${dateStr}`);
      };

      useEffect(() => {
        const computeTarget = (clientX, clientY) => {
          const grid = gridRef.current;
          if (!grid) return null;
          const rect = grid.getBoundingClientRect();
          const x = clientX - rect.left;
          const y = clientY - rect.top + grid.scrollTop;
          if (x < TIME_COL_WIDTH || x > rect.width) return null;
          let hour = START_HOUR + y / HOUR_HEIGHT;
          hour = Math.round(hour * 4) / 4;
          hour = Math.max(START_HOUR, Math.min(END_HOUR, hour));

          if (viewRef.current === 'day') {
            return { date: selectedDayStrRef.current, hour, dayIdx: 0 };
          }

          const dayWidth = (rect.width - TIME_COL_WIDTH) / 7;
          const dayIdx = Math.floor((x - TIME_COL_WIDTH) / dayWidth);
          if (dayIdx < 0 || dayIdx >= 7) return null;
          const date = new Date(weekStartRef.current);
          date.setDate(date.getDate() + dayIdx);
          return { date: formatDate(date), hour, dayIdx };
        };

        const onMove = (e) => {
          const s = dragStateRef.current;
          if (!s) return;
          const dist = Math.hypot(e.clientX - s.startX, e.clientY - s.startY);
          if (s.isTouch && !s.isDragging) {
            if (dist > 10) { clearTimeout(s.timer); dragStateRef.current = null; setDragInfo(null); }
            return;
          }
          if (!s.isTouch && !s.isDragging && dist > 4) s.isDragging = true;
          if (s.isDragging) {
            if (e.cancelable) e.preventDefault();
            s.target = computeTarget(e.clientX, e.clientY);
            setDragInfo({ ...s });
          }
        };

        const onUp = (e) => {
          const s = dragStateRef.current;
          if (!s) return;
          if (s.timer) clearTimeout(s.timer);
          if (s.isDragging) {
            const target = computeTarget(e.clientX, e.clientY);
            if (target) {
              const duration = s.ev.end - s.ev.start;
              let newStart = target.hour;
              let newEnd = newStart + duration;
              if (newEnd > END_HOUR + 1) {
                newEnd = END_HOUR + 1;
                newStart = Math.max(START_HOUR, newEnd - duration);
                newEnd = newStart + duration;
              }
              setEvents(prev => prev.map(ev =>
                ev.id === s.id ? { ...ev, date: target.date, endDate: target.date, start: newStart, end: newEnd } : ev
              ));
            }
            justDraggedRef.current = true;
            setTimeout(() => { justDraggedRef.current = false; }, 250);
          } else {
            openEventMenu(s.id, e.clientX, e.clientY);
          }
          dragStateRef.current = null;
          setDragInfo(null);
        };

        window.addEventListener('pointermove', onMove, { passive: false });
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
        };
      }, [events]);

      const handleEventPointerDown = (e, ev) => {
        e.stopPropagation();
        const isMulti = (ev.endDate || ev.date) !== ev.date;
        if (isMulti) {
          e.preventDefault();
          const startX = e.clientX, startY = e.clientY;
          const onUp2 = (e2) => {
            const dist = Math.hypot(e2.clientX - startX, e2.clientY - startY);
            if (dist < 8) {
              openEventMenu(ev.id, e2.clientX, e2.clientY);
            }
            window.removeEventListener('pointerup', onUp2);
          };
          window.addEventListener('pointerup', onUp2);
          return;
        }
        const isTouch = e.pointerType === 'touch';
        const state = {
          id: ev.id, ev,
          startX: e.clientX, startY: e.clientY,
          isTouch, isDragging: false, timer: null, target: null,
        };
        dragStateRef.current = state;
        if (isTouch) {
          state.timer = setTimeout(() => {
            if (dragStateRef.current === state && !state.isDragging) {
              state.isDragging = true;
              if (navigator.vibrate) navigator.vibrate(20);
              setDragInfo({ ...state });
            }
          }, 280);
        }
      };

      const openNewEvent = (date, hour) => {
        const startH = hour != null ? Math.max(START_HOUR, Math.min(END_HOUR-1, hour)) : 19;
        const dStr = formatDate(date);
        setEditing({
          id: null, title: '',
          category: categories[0]?.id || 'other',
          date: dStr, endDate: dStr,
          start: startH, end: startH + 1,
          completed: false, location: '', who: '',
        });
      };

      const saveEvent = () => {
        if (!editing.title.trim()) return;
        if (editing.endDate < editing.date) return;
        if (editing.endDate === editing.date && editing.end <= editing.start) return;
        if (editing.id == null) {
          const newId = Math.max(0, ...events.map(e => e.id)) + 1;
          setEvents([...events, { ...editing, id: newId }]);
        } else {
          setEvents(events.map(e => e.id === editing.id ? editing : e));
        }
        setEditing(null);
      };

      const deleteEventFromEditor = () => {
        const ev = events.find(e => e.id === editing.id);
        setEvents(events.filter(e => e.id !== editing.id));
        setEditing(null);
        if (ev) {
          showToast(`已删除"${ev.title}"`, {
            duration: 5000,
            undo: () => { setEvents(prev => [...prev, ev]); setToast(null); },
          });
        }
      };

      const onMonthDayTap = (d) => {
        if (isMobile) {
          setSelectedDay(d);
          setView('day');
        } else {
          const today0 = new Date(); today0.setHours(0,0,0,0);
          const baseMonday = new Date(today0);
          const bd = baseMonday.getDay() || 7;
          baseMonday.setDate(baseMonday.getDate() - bd + 1);
          const targetMonday = new Date(d);
          const td = targetMonday.getDay() || 7;
          targetMonday.setDate(targetMonday.getDate() - td + 1);
          targetMonday.setHours(0,0,0,0);
          const diffWeeks = Math.round((targetMonday - baseMonday) / (7*24*60*60*1000));
          setWeekOffset(diffWeeks);
          setView('week');
        }
      };

      const updateCat = (id, patch) => setCategories(cs => cs.map(c => c.id === id ? { ...c, ...patch } : c));
      const deleteCat = (id) => {
        if (categories.length <= 1) return;
        const fb = categories.find(c => c.id !== id).id;
        setCategories(cs => cs.filter(c => c.id !== id));
        setEvents(es => es.map(e => e.category === id ? { ...e, category: fb } : e));
      };
      const addCat = () => {
        const newId = `cat_${Date.now()}`;
        const used = new Set(categories.map(c => c.color));
        const avail = PALETTE_KEYS.find(k => !used.has(k)) || 'slate';
        setCategories(cs => [...cs, { id: newId, name: '新分类', color: avail }]);
      };

      const handleExport = () => {
        try {
          const data = { events, categories, exportedAt: new Date().toISOString(), version: 1 };
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `planner-backup-${formatDate(new Date())}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          showToast('备份文件已下载');
        } catch (e) {
          showToast('导出失败：' + e.message);
        }
      };

      const handleImportClick = () => fileInputRef.current?.click();

      const handleImportFile = (e) => {
        const file = e.target.files?.[0];
        e.target.value = '';
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            if (!data || !Array.isArray(data.events) || !Array.isArray(data.categories)) {
              showToast('文件格式不正确');
              return;
            }
            setConfirmModal({
              title: '导入备份',
              message: `将导入 ${data.events.length} 个事项 / ${data.categories.length} 个分类，并覆盖当前所有数据。是否继续？`,
              confirmText: '导入并覆盖',
              danger: true,
              onConfirm: () => {
                setEvents(data.events);
                setCategories(data.categories);
                setConfirmModal(null);
                setShowSettings(false);
                showToast('导入成功');
              },
            });
          } catch (err) {
            showToast('解析失败：' + err.message);
          }
        };
        reader.readAsText(file);
      };

      const handleClearAll = () => {
        setConfirmModal({
          title: '清空所有数据',
          message: '此操作会删除全部事项与自定义分类，且不可撤销。建议先导出备份。',
          confirmText: '确认清空',
          danger: true,
          onConfirm: () => {
            setEvents([]);
            setCategories(DEFAULT_CATEGORIES);
            setConfirmModal(null);
            setShowSettings(false);
            showToast('已清空');
          },
        });
      };

      /* ===== 同步设置：操作 ===== */
      const handleSetupSync = async () => {
        const token = setupTokenInput.trim();
        const gistId = setupGistIdInput.trim();
        if (!token) {
          setSetupError('请输入 GitHub Token');
          return;
        }
        setSetupBusy(true);
        setSetupError(null);
        try {
          let finalGistId = gistId;
          if (gistId) {
            await gistFetch(token, gistId);
          } else {
            const stored = loadStored() || { events, categories, savedAt: new Date().toISOString(), version: 1 };
            const newGist = await gistCreate(token, stored);
            finalGistId = newGist.id;
          }
          try {
            localStorage.setItem(SYNC_TOKEN_KEY, token);
            localStorage.setItem(SYNC_GIST_ID_KEY, finalGistId);
            localStorage.removeItem(SYNC_SKIPPED_KEY);
          } catch {}
          setSyncToken(token);
          setSyncGistId(finalGistId);
          syncTokenRef.current = token;
          syncGistIdRef.current = finalGistId;
          setSetupOpen(false);
          setSetupTokenInput('');
          setSetupGistIdInput('');
          await doPull({ notify: true });
        } catch (err) {
          setSetupError(err.message);
        } finally {
          setSetupBusy(false);
        }
      };

      const handleSkipSetup = () => {
        try { localStorage.setItem(SYNC_SKIPPED_KEY, '1'); } catch {}
        setSetupOpen(false);
        setSyncStatus('disabled');
      };

      const handleDisconnectSync = () => {
        setConfirmModal({
          title: '断开云同步',
          message: '将清除本设备保存的 Token，但不会删除云端数据，也不会影响本地数据。之后可重新连接。',
          confirmText: '断开',
          danger: true,
          onConfirm: () => {
            try {
              localStorage.removeItem(SYNC_TOKEN_KEY);
              localStorage.removeItem(SYNC_GIST_ID_KEY);
            } catch {}
            setSyncToken('');
            setSyncGistId('');
            syncTokenRef.current = '';
            syncGistIdRef.current = '';
            setSyncStatus('disabled');
            setSyncError(null);
            setLastSyncAt(null);
            setConfirmModal(null);
            showToast('已断开云同步');
          },
        });
      };

      const handleManualSync = () => {
        if (pushTimerRef.current) { clearTimeout(pushTimerRef.current); pushTimerRef.current = null; }
        doPull({ notify: true });
      };

      const handleCopyGistId = async () => {
        try {
          await navigator.clipboard.writeText(syncGistId);
          showToast('已复制 Gist ID');
        } catch {
          showToast('复制失败，请手动复制');
        }
      };

      const openSetupFromSettings = () => {
        setShowSettings(false);
        setSetupTokenInput(syncToken || '');
        setSetupGistIdInput(syncGistId || '');
        setSetupError(null);
        setSetupOpen(true);
      };

      const computeWeekBars = (wDays) => {
        const wStart = formatDate(wDays[0]);
        const wEnd = formatDate(wDays[6]);
        const overlapping = events.filter(ev => {
          const eEnd = ev.endDate || ev.date;
          return ev.date <= wEnd && eEnd >= wStart;
        });
        overlapping.sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          const aLen = (new Date(a.endDate || a.date) - new Date(a.date));
          const bLen = (new Date(b.endDate || b.date) - new Date(b.date));
          if (aLen !== bLen) return bLen - aLen;
          return a.start - b.start;
        });
        const lanes = [];
        return overlapping.map(ev => {
          const evEnd = ev.endDate || ev.date;
          const sStr = ev.date < wStart ? wStart : ev.date;
          const eStr = evEnd > wEnd ? wEnd : evEnd;
          const startCol = wDays.findIndex(d => formatDate(d) === sStr);
          const endCol = wDays.findIndex(d => formatDate(d) === eStr);
          let lane = -1;
          for (let i = 0; i < lanes.length; i++) {
            if (lanes[i] < startCol) { lane = i; lanes[i] = endCol; break; }
          }
          if (lane === -1) { lane = lanes.length; lanes.push(endCol); }
          return { ev, startCol, endCol, lane };
        });
      };

      const hours = Array.from({length: END_HOUR-START_HOUR+1}, (_,i) => START_HOUR+i);
      const inputCls = "w-full px-3 py-2 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-rose-200 dark:focus:ring-rose-800 focus:border-rose-400";

      const isTimelineView = view === 'week' || view === 'day';
      const timelineDays = view === 'day' ? [selectedDay] : weekDays;

      const headerLabel = (() => {
        if (view === 'day') return `${selectedDay.getMonth()+1} 月 ${selectedDay.getDate()} 日`;
        if (view === 'week') return `${weekStart.getFullYear()} 年 ${weekStart.getMonth()+1} 月`;
        return `${monthInfo.monthDate.getFullYear()} 年 ${monthInfo.monthDate.getMonth()+1} 月`;
      })();
      const headerLabelMinWidth = view === 'day' ? '5.5rem' : '6.5rem';

      const goPrev = () => {
        if (view === 'day') { const d = new Date(selectedDay); d.setDate(d.getDate() - 1); setSelectedDay(d); }
        else if (view === 'week') setWeekOffset(o => o-1);
        else setMonthOffset(o => o-1);
      };
      const goNext = () => {
        if (view === 'day') { const d = new Date(selectedDay); d.setDate(d.getDate() + 1); setSelectedDay(d); }
        else if (view === 'week') setWeekOffset(o => o+1);
        else setMonthOffset(o => o+1);
      };
      const goToday = () => {
        if (view === 'day') setSelectedDay(new Date());
        else if (view === 'week') setWeekOffset(0);
        else setMonthOffset(0);
      };
      const offsetIsZero = view === 'day'
        ? formatDate(selectedDay) === todayStr
        : view === 'week' ? weekOffset === 0 : monthOffset === 0;

      const pillBase = "h-9 flex items-center bg-slate-100 dark:bg-slate-800 rounded-full";

      const MONTH_LANE_HEIGHT = 38;
      const MONTH_BAR_HEIGHT = 34;
      const MONTH_TOP_OFFSET = 30;
      const MONTH_LANE_CAP = 3;

      const syncDotInfo = (() => {
        if (!syncToken || !syncGistId) {
          return { color: 'bg-slate-300 dark:bg-slate-600', label: '未启用云同步', animate: false };
        }
        if (syncStatus === 'syncing') return { color: 'bg-sky-500', label: '同步中…', animate: true };
        if (syncStatus === 'pending') return { color: 'bg-amber-400', label: '等待同步', animate: true };
        if (syncStatus === 'error') return { color: 'bg-rose-500', label: '同步出错', animate: false };
        if (syncStatus === 'synced') return { color: 'bg-emerald-500', label: '已同步', animate: false };
        return { color: 'bg-slate-300 dark:bg-slate-600', label: '未同步', animate: false };
      })();

      const renderEventMenu = () => {
        if (!eventMenu) return null;
        const ev = events.find(x => x.id === eventMenu.id);
        if (!ev) return null;
        const MENU_W = 180;
        const MENU_H = 240;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        let left = eventMenu.x - MENU_W / 2;
        left = Math.max(8, Math.min(left, vw - MENU_W - 8));
        let top;
        if (eventMenu.y + MENU_H + 16 > vh) top = Math.max(8, eventMenu.y - MENU_H - 8);
        else top = eventMenu.y + 8;

        const cat = getCat(ev.category);
        const style = getStyle(ev.category);

        return (
          <>
            <div className="fixed inset-0 z-[55]"
              onClick={() => setEventMenu(null)}
              onPointerDown={() => setEventMenu(null)} />
            <div
              className="fixed z-[56] bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden"
              style={{ left, top, width: MENU_W }}
              onClick={e => e.stopPropagation()}
            >
              <div className="px-3 py-2.5 border-b border-slate-100 dark:border-slate-700">
                <div className="flex items-center gap-1.5 mb-0.5">
                  <div className={`w-2 h-2 rounded-full shrink-0 ${style.dot}`}></div>
                  <span className="text-[10px] text-slate-500 dark:text-slate-400">{cat.name}</span>
                </div>
                <div className="text-sm font-semibold text-slate-800 dark:text-slate-100 truncate">{ev.title}</div>
                <div className="text-[11px] text-slate-500 dark:text-slate-400 truncate mt-0.5">
                  {ev.date}{(ev.endDate && ev.endDate !== ev.date) ? ` → ${ev.endDate}` : ''} · {formatTime(ev.start)}-{formatTime(ev.end)}
                </div>
              </div>
              <button
                onClick={() => { toggleComplete(ev.id); setEventMenu(null); }}
                className="w-full flex items-center gap-2.5 px-3 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/70 active:bg-slate-200 dark:active:bg-slate-700 transition"
              >
                <div className={`w-7 h-7 rounded-lg flex items-center justify-center shrink-0 ${
                  ev.completed ? 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400'
                               : 'bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300'
                }`}>
                  {ev.completed ? <RotateCcw className="w-3.5 h-3.5" strokeWidth={2.25}/> : <Check className="w-4 h-4" strokeWidth={3}/>}
                </div>
                <span>{ev.completed ? '取消完成' : '标记完成'}</span>
              </button>
              <button
                onClick={() => { setEditing({ ...ev }); setEventMenu(null); }}
                className="w-full flex items-center gap-2.5 px-3 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/70 active:bg-slate-200 dark:active:bg-slate-700 transition"
              >
                <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 bg-sky-100 dark:bg-sky-900/40 text-sky-600 dark:text-sky-300">
                  <Edit2 className="w-3.5 h-3.5" strokeWidth={2.25}/>
                </div>
                <span>编辑</span>
              </button>
              <button
                onClick={() => {
                  setClipboardEvent({ ...ev });
                  setEventMenu(null);
                  showToast(`已复制"${ev.title}"`);
                }}
                className="w-full flex items-center gap-2.5 px-3 py-3 text-sm text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700/70 active:bg-slate-200 dark:active:bg-slate-700 transition"
              >
                <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 bg-violet-100 dark:bg-violet-900/40 text-violet-600 dark:text-violet-300">
                  <Copy className="w-3.5 h-3.5" strokeWidth={2.25}/>
                </div>
                <span>复制</span>
              </button>
              <button
                onClick={() => { deleteEventById(ev.id); setEventMenu(null); }}
                className="w-full flex items-center gap-2.5 px-3 py-3 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-900/30 active:bg-rose-100 dark:active:bg-rose-900/50 transition"
              >
                <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 bg-rose-100 dark:bg-rose-900/40 text-rose-600 dark:text-rose-300">
                  <Trash2 className="w-3.5 h-3.5" strokeWidth={2.25}/>
                </div>
                <span>删除</span>
              </button>
            </div>
          </>
        );
      };

      const syncConnected = !!(syncToken && syncGistId);

      return (
        <div className="w-full h-screen bg-slate-50 dark:bg-slate-950 flex flex-col font-sans text-slate-900 dark:text-slate-100"
          style={{ touchAction: dragInfo?.isDragging ? 'none' : undefined,
                   userSelect: dragInfo?.isDragging ? 'none' : undefined }}>

          {/* ===== 顶栏 ===== */}
          <div
            className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-3 pb-2.5 flex items-center justify-between shrink-0 gap-2"
            style={{ paddingTop: 'max(0.625rem, env(safe-area-inset-top))' }}
          >
            <div className="flex items-center gap-2 min-w-0">
              <div className={pillBase}>
                <button onClick={goPrev}
                  className="h-9 w-8 flex items-center justify-center rounded-l-full hover:bg-slate-200/70 dark:hover:bg-slate-700/70 transition">
                  <ChevronLeft className="w-4 h-4 text-slate-600 dark:text-slate-300" strokeWidth={2.25}/>
                </button>
                <div
                  className="text-sm font-semibold text-slate-800 dark:text-slate-100 text-center px-1 select-none"
                  style={{ minWidth: headerLabelMinWidth }}
                >
                  {headerLabel}
                </div>
                <button onClick={goNext}
                  className="h-9 w-8 flex items-center justify-center rounded-r-full hover:bg-slate-200/70 dark:hover:bg-slate-700/70 transition">
                  <ChevronRight className="w-4 h-4 text-slate-600 dark:text-slate-300" strokeWidth={2.25}/>
                </button>
              </div>

              {!offsetIsZero && (
                <button
                  onClick={goToday}
                  className="h-9 px-3.5 rounded-full bg-sky-50 dark:bg-sky-900/40 text-sky-600 dark:text-sky-300 hover:bg-sky-100 dark:hover:bg-sky-900/60 transition text-xs font-medium shrink-0"
                >
                  today
                </button>
              )}
            </div>

            <div className="flex items-center gap-1.5 shrink-0">
              <div className={`${pillBase} p-0.5`}>
                {isMobile ? (
                  <>
                    <button onClick={() => setView('month')}
                      className={`px-3 h-8 text-xs font-medium rounded-full transition ${
                        view === 'month' ? 'bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 shadow-sm' : 'text-slate-500 dark:text-slate-400'
                      }`}>月</button>
                    <button onClick={() => setView('day')}
                      className={`px-3 h-8 text-xs font-medium rounded-full transition ${
                        view === 'day' ? 'bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 shadow-sm' : 'text-slate-500 dark:text-slate-400'
                      }`}>日</button>
                  </>
                ) : (
                  <>
                    <button onClick={() => setView('week')}
                      className={`px-3 h-8 text-xs font-medium rounded-full transition ${
                        view === 'week' ? 'bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 shadow-sm' : 'text-slate-500 dark:text-slate-400'
                      }`}>周</button>
                    <button onClick={() => setView('month')}
                      className={`px-3 h-8 text-xs font-medium rounded-full transition ${
                        view === 'month' ? 'bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 shadow-sm' : 'text-slate-500 dark:text-slate-400'
                      }`}>月</button>
                  </>
                )}
              </div>

              {view === 'week' && (
                <div className="hidden md:flex items-center gap-1.5 h-9 text-xs bg-emerald-50 dark:bg-emerald-900/40 px-3 rounded-full border border-emerald-200 dark:border-emerald-800">
                  <Sparkles className="w-3.5 h-3.5 text-emerald-500 dark:text-emerald-400" />
                  <span className="font-bold text-emerald-600 dark:text-emerald-300">{weekEventsCount.done}</span>
                  <span className="text-emerald-400 dark:text-emerald-500">/ {weekEventsCount.total}</span>
                </div>
              )}

              <button
                onClick={() => setShowSettings(true)}
                title={syncDotInfo.label}
                className="relative h-9 w-9 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 transition"
              >
                <Settings className="w-4 h-4" strokeWidth={2}/>
                <span className={`absolute top-0.5 right-0.5 w-2 h-2 rounded-full ${syncDotInfo.color} ring-2 ring-white dark:ring-slate-900 ${syncDotInfo.animate ? 'animate-pulse' : ''}`}></span>
              </button>

              <button onClick={() => openNewEvent(view === 'day' ? selectedDay : new Date(), 19)}
                className="h-9 px-3 flex items-center gap-1 bg-rose-500 hover:bg-rose-600 text-white rounded-full text-sm font-medium transition shadow-sm">
                <Plus className="w-4 h-4" strokeWidth={3} />
                <span className="hidden sm:inline">新建</span>
              </button>
            </div>
          </div>

          {/* ===== 粘贴模式提示条 ===== */}
          {clipboardEvent && (
            <div className="bg-sky-50 dark:bg-sky-900/30 border-b border-sky-200 dark:border-sky-800 px-3 py-1.5 flex items-center gap-2 text-xs shrink-0">
              <Copy className="w-3.5 h-3.5 text-sky-600 dark:text-sky-400 shrink-0" strokeWidth={2.25}/>
              <span className="text-sky-700 dark:text-sky-200 truncate flex-1">
                已复制 <strong>"{clipboardEvent.title}"</strong> · 点击空白时段或日期粘贴
                <span className="hidden sm:inline opacity-60"> · 按 Esc 取消</span>
              </span>
              <button
                onClick={() => setClipboardEvent(null)}
                className="shrink-0 px-2 py-0.5 rounded-md hover:bg-sky-100 dark:hover:bg-sky-900/60 text-sky-700 dark:text-sky-200 font-medium"
              >
                取消
              </button>
            </div>
          )}

          {/* ===== 时间轴视图 ===== */}
          {isTimelineView && (
            <>
              <div className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex shrink-0">
                <div style={{width: TIME_COL_WIDTH}} className="shrink-0"></div>
                {timelineDays.map((d, i) => {
                  const isToday = formatDate(d) === todayStr;
                  const wd = (d.getDay() || 7) - 1;
                  return (
                    <div key={i} className="flex-1 py-2 text-center border-l border-slate-100 dark:border-slate-800 min-w-0">
                      <div className="text-xs text-slate-500 dark:text-slate-400">周{dayNames[wd]}</div>
                      <div className="mt-1 flex justify-center">
                        <div className={`text-sm font-semibold w-7 h-7 flex items-center justify-center rounded-full ${
                          isToday ? 'text-white bg-rose-500' : 'text-slate-800 dark:text-slate-100'
                        }`}>{d.getDate()}</div>
                      </div>
                    </div>
                  );
                })}
              </div>

              <div ref={gridRef} className="flex-1 overflow-y-auto bg-white dark:bg-slate-900">
                <div className="flex relative">
                  <div style={{width: TIME_COL_WIDTH}} className="shrink-0">
                    {hours.map(h => (
                      <div key={h} style={{height:HOUR_HEIGHT}} className="text-xs text-slate-400 dark:text-slate-500 text-right pr-2 -translate-y-2">
                        {h}:00
                      </div>
                    ))}
                  </div>

                  {timelineDays.map((d, dayIdx) => {
                    const dStr = formatDate(d);
                    const isToday = dStr === todayStr;

                    return (
                      <div
                        key={dayIdx}
                        className={`flex-1 border-l border-slate-100 dark:border-slate-800 relative min-w-0 ${clipboardEvent ? 'cursor-copy' : ''}`}
                        onClick={(e) => {
                          if (!clipboardEvent) return;
                          if (e.target.closest('[data-event-card]')) return;
                          const grid = gridRef.current;
                          if (!grid) return;
                          const rect = grid.getBoundingClientRect();
                          const y = e.clientY - rect.top + grid.scrollTop;
                          let hour = START_HOUR + y / HOUR_HEIGHT;
                          hour = Math.round(hour * 4) / 4;
                          hour = Math.max(START_HOUR, Math.min(END_HOUR, hour));
                          pasteClipboard(dStr, hour);
                        }}
                      >
                        {hours.map(h => (
                          <div key={h} style={{height:HOUR_HEIGHT}} className="border-b border-slate-100 dark:border-slate-800"></div>
                        ))}

                        {displayEvents.map(ev => {
                          const seg = getSegment(ev, dStr);
                          if (!seg) return null;
                          const top = (seg.start - START_HOUR) * HOUR_HEIGHT;
                          const height = (seg.end - seg.start) * HOUR_HEIGHT;
                          const style = getStyle(ev.category);
                          const missed = isMissed(ev);
                          const isBeingDragged = dragInfo?.isDragging && dragInfo.id === ev.id;

                          let cardCls = '', circleCls = '';
                          if (missed) {
                            cardCls = 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700';
                            circleCls = 'border-2 border-slate-300 dark:border-slate-600';
                          } else if (ev.completed) {
                            cardCls = `${style.deep} ${style.deepText} border ${style.deepBorder}`;
                            circleCls = `${style.dot} border-2 ${style.deepBorder}`;
                          } else {
                            cardCls = `${style.light} ${style.text} border ${style.border}`;
                            circleCls = `border-2 ${style.border} bg-white/60 dark:bg-slate-900/40`;
                          }

                          const roundCls = seg.isMulti
                            ? `${seg.isStart ? 'rounded-t-lg' : ''} ${seg.isEnd ? 'rounded-b-lg' : ''}`
                            : 'rounded-lg';

                          const showLocation = ev.location && height >= 70 && seg.isStart;
                          const showWho = ev.who && height >= (showLocation ? 90 : 70) && seg.isStart;

                          return (
                            <div
                              key={`${ev.id}-${dStr}`}
                              data-event-card="true"
                              onPointerDown={(e) => handleEventPointerDown(e, ev)}
                              onDoubleClick={(e) => { e.stopPropagation(); setEditing({ ...ev }); }}
                              style={{ top, height: height-3, touchAction: 'none' }}
                              className={`absolute left-1 right-1 ${roundCls} p-2 pr-7 text-left select-none ${cardCls} ${
                                isBeingDragged ? 'shadow-lg ring-2 ring-rose-400' : ''
                              }`}
                            >
                              {seg.isEnd && (
                                <div className={`absolute top-1.5 right-1.5 w-5 h-5 rounded-full flex items-center justify-center transition-colors ${circleCls}`}>
                                  {ev.completed && <Check className="w-3 h-3 text-white" strokeWidth={4} />}
                                </div>
                              )}

                              {seg.isStart && (
                                <>
                                  <div className={`text-xs font-semibold truncate ${missed ? 'line-through' : ''}`}>
                                    {ev.title}
                                    {seg.isMulti && <span className="ml-1 opacity-60">→</span>}
                                  </div>
                                  <div className="text-xs opacity-75 truncate mt-0.5">
                                    {formatTime(ev.start)}{seg.isMulti ? ` 起` : ` - ${formatTime(ev.end)}`}
                                  </div>
                                  {showLocation && (
                                    <div className="text-xs truncate mt-1 flex items-center opacity-80">
                                      <MapPin className="w-3 h-3 shrink-0" strokeWidth={1.75} />
                                      <span className="ml-1 truncate">{ev.location}</span>
                                    </div>
                                  )}
                                  {showWho && (
                                    <div className="text-xs truncate mt-0.5 flex items-center opacity-80">
                                      <Users className="w-3 h-3 shrink-0" strokeWidth={1.75} />
                                      <span className="ml-1 truncate">{ev.who}</span>
                                    </div>
                                  )}
                                </>
                              )}
                              {!seg.isStart && (
                                <div className="text-xs font-medium opacity-70 truncate">
                                  <span className="opacity-60">←</span> {ev.title}
                                  {!seg.isEnd && <span className="ml-1 opacity-60">→</span>}
                                </div>
                              )}
                              {!seg.isStart && seg.isEnd && (
                                <div className="text-xs opacity-75 truncate mt-0.5">截止 {formatTime(ev.end)}</div>
                              )}
                            </div>
                          );
                        })}

                        {isToday && (() => {
                          const now = new Date();
                          const nowHour = now.getHours() + now.getMinutes()/60;
                          if (nowHour >= START_HOUR && nowHour <= END_HOUR + 1) {
                            const top = (nowHour-START_HOUR)*HOUR_HEIGHT;
                            return (
                              <div style={{top}} className="absolute left-0 right-0 z-10 pointer-events-none">
                                <div className="h-0.5 bg-rose-500 relative">
                                  <div className="absolute -left-1 -top-1 w-2.5 h-2.5 rounded-full bg-rose-500"></div>
                                </div>
                              </div>
                            );
                          }
                          return null;
                        })()}
                      </div>
                    );
                  })}
                </div>
              </div>
            </>
          )}

          {/* ===== 月视图 ===== */}
          {view === 'month' && (
            <>
              <div className="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 grid grid-cols-7 shrink-0">
                {monthDayLabels.map((l, i) => (
                  <div key={i} className="py-2 text-center text-xs text-slate-500 dark:text-slate-400 border-l border-slate-100 dark:border-slate-800 first:border-l-0">{l}</div>
                ))}
              </div>
              <div className="flex-1 overflow-y-auto bg-white dark:bg-slate-900">
                <div className="flex flex-col h-full">
                  {monthInfo.weeks.map((wDays, wIdx) => {
                    const bars = computeWeekBars(wDays);
                    const overflow = wDays.map((d, di) => {
                      const dStr = formatDate(d);
                      return bars.filter(b => b.lane >= MONTH_LANE_CAP && b.startCol <= di && b.endCol >= di && (b.ev.date <= dStr && (b.ev.endDate || b.ev.date) >= dStr)).length;

                          const isToday = dStr === todayStr;
                          const inMonth = d.getMonth() === monthInfo.monthDate.getMonth();
                          return (
                            <div
                              key={di}
                              onClick={(e) => {
                                if (e.target === e.currentTarget || e.target.dataset.empty) {

                                  } else {

                                }
                              }}

                              data-empty="true"

                                  inMonth ? 'text-slate-700 dark:text-slate-200' : 'text-slate-400 dark:text-slate-600'
                                }`}>{d.getDate()}</div>
                              </div>
                              <div data-empty="true" style={{ height: MONTH_LANE_CAP * MONTH_LANE_HEIGHT + (overflow[di] > 0 ? 18 : 0) }}></div>

                                <button
                                  onClick={(e) => {
                                    e.stopPropagation();
                                    if (isMobile) { setSelectedDay(d); setView('day'); }

                                      const w = new Date(wDays[0]);
                                      const today0 = new Date(); today0.setHours(0,0,0,0);
                                      const baseMonday = new Date(today0);
                                      const bd = baseMonday.getDay() || 7;
                                      baseMonday.setDate(baseMonday.getDate() - bd + 1);
                                      const diffWeeks = Math.round((w - baseMonday) / (7*24*60*60*1000));
                                      setWeekOffset(diffWeeks);
                                      setView('week');
                                    }
                                  }}

                                >
                                  +{overflow[di]} 更多
                                </button>
                              )}
                            </div>
                          );

                          darkMode
                            ? 'bg-indigo-50 dark:bg-indigo-900/40 border-indigo-300 dark:border-indigo-700 text-indigo-700 dark:text-indigo-200 ring-2 ring-indigo-200 dark:ring-indigo-800'
                            : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300'
                        }`}>
                        <Moon className="w-4 h-4" />
                        <span>深色</span>
                      </button>
                    </div>
                  </div>

                  <div>
                    <div className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">数据备份</div>
                    <div className="space-y-2">
                      <button
                        onClick={handleExport}
                        className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
                        <div className="w-9 h-9 rounded-lg bg-emerald-100 dark:bg-emerald-900/40 text-emerald-600 dark:text-emerald-300 flex items-center justify-center shrink-0">
                          <Download className="w-4 h-4" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-medium text-slate-800 dark:text-slate-100">导出备份</div>
                          <div className="text-xs text-slate-500 dark:text-slate-400 truncate">下载 JSON 文件到本地</div>
                        </div>
                      </button>

                      <button
                        onClick={handleImportClick}
                        className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
                        <div className="w-9 h-9 rounded-lg bg-sky-100 dark:bg-sky-900/40 text-sky-600 dark:text-sky-300 flex items-center justify-center shrink-0">
                          <Upload className="w-4 h-4" />
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-medium text-slate-800 dark:text-slate-100">导入备份</div>
                          <div className="text-xs text-slate-500 dark:text-slate-400 truncate">从 JSON 文件恢复数据</div>
                        </div>
                      </button>

                      <input
                        ref={fileInputRef}
                        type="file"
                        accept="application/json,.json"
                        onChange={handleImportFile}
                        className="hidden"
                      />
                    </div>
                  </div>

                  <div>
                    <div className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">分类</div>
                    <button
                      onClick={() => { setShowSettings(false); setManagingCats(true); }}
                      className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition text-left">
                      <div className="w-9 h-9 rounded-lg bg-violet-100 dark:bg-violet-900/40 text-violet-600 dark:text-violet-300 flex items-center justify-center shrink-0">
                        <Tag className="w-4 h-4" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-slate-800 dark:text-slate-100">管理分类</div>
                        <div className="text-xs text-slate-500 dark:text-slate-400 truncate">{categories.length} 个分类</div>
                      </div>
                    </button>
                  </div>

                  <div>
                    <div className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">危险操作</div>
                    <button
                      onClick={handleClearAll}
                      className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg border border-rose-200 dark:border-rose-900 bg-rose-50/50 dark:bg-rose-900/20 hover:bg-rose-50 dark:hover:bg-rose-900/30 transition text-left">
                      <div className="w-9 h-9 rounded-lg bg-rose-100 dark:bg-rose-900/50 text-rose-600 dark:text-rose-300 flex items-center justify-center shrink-0">
                        <Trash2 className="w-4 h-4" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-medium text-rose-700 dark:text-rose-300">清空所有数据</div>
                        <div className="text-xs text-rose-500/80 dark:text-rose-400/70 truncate">建议先导出备份</div>
                      </div>
                    </button>
                  </div>
                </div>

                <div className="px-5 py-3 text-center text-[11px] text-slate-400 dark:text-slate-500 border-t border-slate-100 dark:border-slate-800">
                  共 {events.length} 个事项 {syncConnected ? '· 已启用云同步' : '· 数据保存在本设备'}
                </div>
              </div>
            </div>
          )}

          {/* ===== 同步设置弹窗 ===== */}
          {setupOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[65] p-4 overflow-y-auto"
              onClick={() => { if (!setupBusy) setSetupOpen(false); }}>
              <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md my-auto" onClick={e => e.stopPropagation()}>
                <div className="px-5 pt-5 pb-2">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-10 h-10 rounded-xl bg-sky-100 dark:bg-sky-900/40 text-sky-600 dark:text-sky-300 flex items-center justify-center">
                      <Cloud className="w-5 h-5"/>
                    </div>
                    <div className="flex-1 min-w-0">
                      <h2 className="text-base font-semibold text-slate-800 dark:text-slate-100">{syncConnected ? '修改云同步配置' : '启用云同步'}</h2>
                      <p className="text-[11px] text-slate-500 dark:text-slate-400">用 GitHub Gist 在所有设备间同步</p>
                    </div>
                  </div>
                </div>

                <div className="px-5 pb-3 space-y-3">
                  <div>
                    <label className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">GitHub Token</label>
                    <input
                      type="password"
                      autoComplete="off"
                      placeholder="ghp_xxxxxxxxxxxxxxxx"
                      className={inputCls + ' font-mono text-xs'}
                      value={setupTokenInput}
                      onChange={e => setSetupTokenInput(e.target.value)}
                      disabled={setupBusy}
                    />
                    <a
                      href="https://github.com/settings/tokens/new?description=Planner%20Sync&scopes=gist"
                      target="_blank" rel="noopener noreferrer"
                      className="inline-flex items-center gap-1 mt-1 text-[11px] text-sky-600 dark:text-sky-400 hover:underline"
                    >
                      <Link2 className="w-3 h-3"/>没有 Token？点这里生成（只需勾选 gist 权限）
                    </a>
                  </div>

                  <div>
                    <label className="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1 block">
                      Gist ID <span className="text-slate-400">（可选）</span>
                    </label>
                    <input
                      type="text"
                      autoComplete="off"
                      placeholder="留空将自动创建新的 Gist"
                      className={inputCls + ' font-mono text-xs'}
                      value={setupGistIdInput}
                      onChange={e => setSetupGistIdInput(e.target.value)}
                      disabled={setupBusy}
                    />
                    <p className="text-[11px] text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">
                      💡 第二台设备使用时，在第一台设备的"设置 → 云同步"里复制 Gist ID 粘贴到这里。
                    </p>
                  </div>

                  {setupError && (
                    <div className="text-xs text-rose-600 dark:text-rose-300 bg-rose-50 dark:bg-rose-900/30 border border-rose-200 dark:border-rose-900/50 rounded-md px-3 py-2">
                      {setupError}
                    </div>
                  )}

                  <div className="text-[11px] text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/60 rounded-md px-3 py-2 border border-slate-200 dark:border-slate-700 leading-relaxed">
                    🔒 Token 只保存在本设备的浏览器中，不会上传到任何第三方服务器。Gist 默认为私密（secret），只有持有 Token 才能访问。
                  </div>
                </div>

                <div className="px-5 py-3 bg-slate-50 dark:bg-slate-800/60 rounded-b-2xl flex items-center justify-between gap-2">
                  {!syncConnected ? (
                    <button
                      onClick={handleSkipSetup}
                      disabled={setupBusy}
                      className="text-xs text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 disabled:opacity-50">
                      暂不启用
                    </button>
                  ) : (
                    <button
                      onClick={() => setSetupOpen(false)}
                      disabled={setupBusy}
                      className="text-xs text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 disabled:opacity-50">
                      取消
                    </button>
                  )}
                  <button
                    onClick={handleSetupSync}
                    disabled={setupBusy || !setupTokenInput.trim()}
                    className="px-4 py-2 text-sm bg-sky-500 hover:bg-sky-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-lg font-medium shadow-sm flex items-center gap-1.5">
                    {setupBusy && <RefreshCw className="w-3.5 h-3.5 animate-spin"/>}
                    {setupBusy ? '连接中…' : (syncConnected ? '更新配置' : '开始同步')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ===== 通用确认弹窗 ===== */}
          {confirmModal && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[70] p-4"
              onClick={() => setConfirmModal(null)}>
              <div className="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-sm" onClick={e => e.stopPropagation()}>
                <div className="px-5 pt-5 pb-3">
                  <h3 className="text-base font-semibold text-slate-800 dark:text-slate-100 mb-2">{confirmModal.title}</h3>
                  <p className="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">{confirmModal.message}</p>
                </div>
                <div className="px-5 py-3 bg-slate-50 dark:bg-slate-800/60 rounded-b-2xl flex items-center justify-end gap-2">
                  <button onClick={() => setConfirmModal(null)}
                    className="px-4 py-2 text-sm text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg">取消</button>
                  <button onClick={confirmModal.onConfirm}
                    className={`px-4 py-2 text-sm rounded-lg font-medium shadow-sm text-white ${
                      confirmModal.danger ? 'bg-rose-500 hover:bg-rose-600' : 'bg-slate-800 dark:bg-slate-100 dark:text-slate-900 hover:bg-slate-900'
                    }`}>{confirmModal.confirmText || '确认'}</button>
                </div>
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[80] flex items-center gap-1 px-1 py-1 pl-4 rounded-full shadow-2xl text-sm bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-900 max-w-[90vw]">
              <span className="truncate pr-1">{toast.msg}</span>
              {toast.undo && (
                <button
                  onClick={toast.undo}
                  className="shrink-0 px-3 py-1.5 rounded-full bg-rose-500 hover:bg-rose-600 text-white font-medium text-xs transition flex items-center gap-1"
                >
                  <RotateCcw className="w-3 h-3" strokeWidth={2.5}/>
                  <span>撤销</span>
                </button>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<PlannerApp />);
  </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW失败:', err));
    });
  }
</script>
</body>
</html>
